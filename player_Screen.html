<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D VTT - Player Screen (Local)</title>
    <style>
          #login-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }

  #login-modal {
    background-color: #2d2d2d;
    border: 2px solid #555;
    border-radius: 12px;
    padding: 40px;
    width: 90%;
    max-width: 400px;
    color: #f0f0f0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }

  #login-modal h2 {
    margin-top: 0;
    color: #60A5FA;
    text-align: center;
    margin-bottom: 30px;
  }

  #login-modal input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    background-color: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #f0f0f0;
    font-size: 16px;
  }

  #login-modal input:focus {
    outline: none;
    border-color: #60A5FA;
  }

  #login-modal button {
    width: 100%;
    padding: 12px;
    background-color: #60A5FA;
    color: #1a1a1a;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #login-modal button:hover {
    background-color: #3b82f6;
  }

  #login-modal button:disabled {
    background-color: #555;
    cursor: not-allowed;
  }

  #login-error {
    color: #ff4444;
    margin-top: 10px;
    text-align: center;
    font-size: 14px;
  }

  .hidden {
    display: none !important;
  }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f0f0f0;
            overflow: hidden; /* Hide scrollbars */
            cursor: crosshair; /* Default cursor for tabletop */
        }
        #scene-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute; /* Add position for z-index */
            top: 0;
            left: 0;
            z-index: 1; /* Send 3D scene to back */
        }
        
        /* --- Left Tool Menu (Kept) --- */
        #tool-menu {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .tool-button {
            width: 48px;
            height: 48px;
            padding: 8px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            user-select: none; /* Prevent text selection on long press */
            position: relative; /* For submenu positioning */
        }
        .tool-button:hover {
            background-color: #777;
        }
        .tool-button.active {
            background-color: #007bff;
        }

        #move-submenu {
            display: none; /* Hidden by default */
            position: absolute;
            left: 105%; /* Position to the right of the button */
            top: 0;
            width: 150px;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 100;
        }
        #move-submenu .menu-button,
        #ruler-submenu .menu-button { /* Added ruler button style */
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: background-color 0.2s;
        }
        #move-submenu .menu-button:hover,
        #ruler-submenu .menu-button:hover {
            background-color: #777;
        }
        #move-submenu .menu-button:last-child,
        #ruler-submenu .menu-button:last-child {
            margin-bottom: 0;
        }
        #move-submenu .menu-button.active,
        #ruler-submenu .menu-button.active {
            background-color: #007bff;
            font-weight: bold;
        }
        /* --- End Left Menu Styles --- */

        /* --- Color Swatch Styles (Kept for Ruler) --- */
        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #555;
            cursor: pointer;
            padding: 0;
            background-clip: content-box; 
        }
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 5px #fff;
        }

        /* --- Ruler Tooltip Style (Kept) --- */
        #ruler-tooltip {
            position: absolute;
            display: none; 
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none; 
            z-index: 101;
            transform: translate(10px, -35px); 
            white-space: nowrap;
        }

        /* --- NEW Player HUD (Bottom) Styles --- */
        #player-hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            z-index: 20;
        }
        .hud-button {
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .hud-button:hover {
            background-color: #777;
        }

        /* --- NEW HUD Panel (Modal) Styles --- */
        #hud-panel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            display: none; /* BUG FIX: Começa escondido */
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .hud-panel {
            background-color: #2d2d2d;
            border: 1px solid #555;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            color: #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .close-panel-btn {
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
            float: right;
        }
        .close-panel-btn:hover {
            background-color: #777;
        }
        .hidden {
            display: none;
        }
        
        /* --- NEW Stat Bar Styles (for HP/Mana) --- */
        .stat-bar-group {
            margin-bottom: 15px;
        }
        .stat-bar-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            color: #aaa;
        }
        .stat-bar-outer {
            width: 100%;
            height: 20px;
            background-color: #4a4a4a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .stat-bar-inner {
            height: 100%;
            background-color: #d14444; /* Default red for HP */
            border-radius: 10px 0 0 10px;
            transition: width 0.3s ease;
        }
        .stat-bar-group span {
            display: block;
            text-align: right;
            font-size: 12px;
            margin-top: 4px;
            color: #ccc;
        }

        /* --- Phase 4: character sheet HUD --- */
        .hud-panel.sheet { max-width: 620px; max-height: 82vh; overflow-y: auto; }
        .sheet-sub { color: #9aa0aa; font-size: 13px; font-weight: 400; }
        .char-select { width: 100%; padding: 8px; margin-bottom: 14px; background:#1a1a1a; border:1px solid #444; border-radius:6px; color:#f0f0f0; font-size:14px; }
        .metrics-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
        .metric-card { flex:1 1 70px; background:#1f1f24; border:1px solid #3a3a44; border-radius:8px; padding:8px 4px; text-align:center; }
        .metric-card .l { font-size:11px; color:#9aa0aa; text-transform:uppercase; letter-spacing:.5px; }
        .metric-card .v { font-size:18px; font-weight:700; color:#fff; margin-top:2px; }
        .metric-card .s { font-size:10px; color:#6b7280; }
        .ability-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
        .ability-cell { background:#1f1f24; border:1px solid #3a3a44; border-radius:8px; padding:8px; text-align:center; }
        .ability-cell .ab-name { font-size:11px; color:#9aa0aa; text-transform:uppercase; }
        .ability-cell .ab-score { font-size:20px; font-weight:700; color:#fff; }
        .ability-cell .ab-mod { font-size:12px; color:#60A5FA; }
        .ability-cell .ab-save { font-size:10px; color:#6b7280; }
        .sheet h4 { font-size:13px; color:#cbd0d8; margin:14px 0 6px; border-bottom:1px solid #3a3a44; padding-bottom:4px; }
        .row-item { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:5px 0; font-size:13px; border-bottom:1px solid #2a2a30; }
        .row-item:last-child { border-bottom:none; }
        .row-item b { color:#fff; }
        .tag { font-size:10px; padding:1px 6px; border-radius:999px; background:#3a3a44; color:#aab; }
        .muted { color:#6b7280; font-size:13px; }
        .hp-controls { display:flex; gap:6px; margin-top:8px; }
        .hp-controls button { flex:1; padding:6px 0; background:#3a3a44; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
        .hp-controls button:hover { background:#4a4a55; }
        .hp-controls button.heal { background:#2f5d3a; }
        .hp-controls button.heal:hover { background:#3a7349; }
        .hp-controls button.dmg { background:#5d2f2f; }
        .hp-controls button.dmg:hover { background:#733a3a; }
        details.spell-lvl { margin-bottom:8px; }
        details.spell-lvl summary { color:#cbd0d8; font-size:13px; font-weight:600; padding:4px 0; }
        details.spell-lvl .row-item { padding-left:10px; }

    </style>

<body>
    <!-- Login Modal -->
<div id="login-overlay">
  <div id="login-modal">

      type="text"

    <!-- This container holds the 3D scene -->
    <div id="scene-container"></div>
    
    <!-- Loading Overlay REMOVED -->
    
    <!-- --- Left Tool Menu (Kept) --- -->
    <div id="tool-menu">
        <div id="tool-move-wrapper" style="position: relative;">
            <button id="btn-tool-move" class="tool-button" title="Move Tool (Hold for options)">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>

            <div id="move-submenu">
                <button id="btn-move-standard" class="menu-button">Standard (X/Z)</button>

                <button id="btn-move-y" class="menu-button">Y-Axis (Height)</button>

        </div>
        
        <button id="btn-tool-ruler" class="tool-button" title="Ruler Tool (Hold for options)">

        </button>
        <div id="ruler-submenu" style="display: none; position: absolute; left: 105%; top: 56px; width: 150px; background-color: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 8px; border: 1px solid #444; z-index: 100;">
            <button id="btn-ruler-straight" class="menu-button active">Straight Line</button>
            <button id="btn-ruler-curved" class="menu-button">Curved Line</button>
            <div id="ruler-colors" style="display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; justify-content: center;">
                <button class="color-swatch active" data-color="0x00ffff" style="background-color: #00ffff;" title="Cyan"></button>
                <button class="color-swatch" data-color="0xff00ff" style="background-color: #ff00ff;" title="Magenta"></button>
                <button class="color-swatch" data-color="0xffff00" style="background-color: #ffff00;" title="Yellow"></button>
                <button class="color-swatch" data-color="0xff0000" style="background-color: #ff0000;" title="Red"></button>
            </div>
            <!-- --- Snap Mode Buttons RESTORED --- -->
            <div id="ruler-snap-mode" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
                <button id="btn-ruler-snap-center" class="menu-button active" style="font-size: 13px;">Snap: Center</button>
                <button id="btn-ruler-snap-corner" class="menu-button" style="font-size: 13px;">Snap: Corner</button>

            <!-- --- End Snap Mode Buttons --- -->
        </div>

        <button id="btn-tool-3" class="tool-button" title="Tool 3">T3</button>

    <!-- --- End Tool Menu --- -->
    
    <!-- --- Ruler Tooltip HTML (Kept) --- -->
    <div id="ruler-tooltip">0 ft</div>

    <!-- --- NEW Player HUD (Bottom) --- -->
    <div id="player-hud">
        <button class="hud-button" data-panel="char-panel">Character</button>
        <button class="hud-button" data-panel="inv-panel">Inventory</button>

        <button class="hud-button" data-panel="actions-panel">Actions</button>

    <!-- --- NEW HUD Panel Modals --- -->
    <div id="hud-panel-overlay" class="hidden"> 
        
        <!-- Character Panel -->
        <div id="char-panel" class="hud-panel sheet hidden">

        <div id="inv-panel" class="hud-panel sheet hidden">

        <div id="spells-panel" class="hud-panel sheet hidden">
            <h3>Spells</h3>
            <div id="spells-content"><p class="muted">No character loaded.</p></div>
            <button class="close-panel-btn">Close</button>
        </div>

        <!-- Actions Panel -->
        <div id="actions-panel" class="hud-panel sheet hidden">
            <h3>Actions</h3>

            <button class="close-panel-btn">Close</button>
        </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import {
            loadSRD, ABILITIES, ABILITY_NAMES, abilityMod, fmtMod, proficiencyBonus
        } from './srd.js';
        // --- Firebase Imports REMOVED ---

        // --- Phase 4: character sheet state ---
        let SRD = null;
        let pendingHomebrew = null;
        let myCharacters = [];
        let activeCharId = null;
        const hpState = {}; // charId -> current HP (session-local)
        const escHtml = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

        let scene, camera, renderer, controls;
        let plane, grid;
        let raycaster, mouse;
        let objects = []; 
        let selectedObject = null; 
        
        // --- Firebase State REMOVED ---
        
        // --- Socket.IO connection (created on login) ---
        let socket = null;
        // --- END ---
        
        let currentTool = null; 
        let currentMoveMode = 'standard'; 
        let toolMenuButtons = {};
        let moveSubMenuButtons = {};
        let moveSubMenu;
        let movePressTimer = null;
        let isLongPress = false;
        let isDraggingHeight = false; 

        let currentRulerMode = 'straight'; 
        let currentRulerColor = 0x00ffff; 
        let rulerSubMenu, rulerSubMenuButtons = {};
        let rulerPressTimer = null;
        let isRulerLongPress = false;
        let rulerPoints = []; 
        let currentRulerLine = null; 
        let rulerSegments = []; 
        let lastRulerClickTime = 0; 
        
        // --- Snap Mode Variables RESTORED ---
        let currentRulerSnapMode = 'center'; 
        let rulerSnapSubMenuButtons = {};
        // --- End Restore ---
        
        let rulerTooltip;
        let lastMouseX = 0;
        let lastMouseY = 0;

        const gridSize = 1000; 
        const gridDivisions = 1000; 
        const gridCellSize = gridSize / gridDivisions; 
        const FEET_PER_GRID_CELL = 5; 

        // --- Materials (Simplified) ---
        const defaultMaterial = new THREE.MeshLambertMaterial({ color: 0xdd4444 }); 
        const selectedMaterial = new THREE.MeshLambertMaterial({ color: 0xffff44, emissive: 0xaaaa00 }); 
        const rulerLineMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2, transparent: true, opacity: 0.8 });
        const rulerPreviewMaterial = new THREE.LineDashedMaterial({ 
            color: 0x00ffff, 
            linewidth: 1, 
            transparent: true, 
            opacity: 0.7, 
            dashSize: 0.2, 
            gapSize: 0.1 
        });
        // --- Character materials are created per-part in createCharacterModel (see below) ---

        // --- Firebase Functions REMOVED ---

        function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2d2d2d);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000); 
            camera.position.set(20, 30, 20); 
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('scene-container').appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.maxPolarAngle = Math.PI / 2.1; 
            controls.target.set(0, 0, 0);
            const ambientLight = new THREE.AmbientLight(0xaaaaaa, 1.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 3);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 500;
            dirLight.shadow.camera.bottom = -500;
            dirLight.shadow.camera.left = -500;
            dirLight.shadow.camera.right = 500;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            const planeGeometry = new THREE.PlaneGeometry(gridSize, gridSize);
            const planeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4a4a4a, 
                side: THREE.DoubleSide
            });
            plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2; 
            plane.receiveShadow = true;
            plane.name = "tabletop";
            scene.add(plane);
            grid = new THREE.GridHelper(gridSize, gridDivisions, 0x888888, 0x888888);
            grid.material.opacity = 0.5;
            grid.material.transparent = true;
            grid.position.y = 0.01; 
            scene.add(grid);
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            rulerTooltip = document.getElementById('ruler-tooltip');
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            renderer.domElement.addEventListener('contextmenu', onContextMenu);
            window.addEventListener('keydown', onKeyDown); 

            // --- Tool Menu Listeners (Left - Kept) ---
            toolMenuButtons.move = document.getElementById('btn-tool-move');
            toolMenuButtons.ruler = document.getElementById('btn-tool-ruler');
            toolMenuButtons.tool3 = document.getElementById('btn-tool-3');
            moveSubMenu = document.getElementById('move-submenu');
            moveSubMenuButtons.standard = document.getElementById('btn-move-standard');
            moveSubMenuButtons.x = document.getElementById('btn-move-x');
            moveSubMenuButtons.z = document.getElementById('btn-move-z');
            moveSubMenuButtons.y = document.getElementById('btn-move-y');

            toolMenuButtons.move.addEventListener('pointerdown', handleMoveButtonPress);
            toolMenuButtons.move.addEventListener('pointerup', handleMoveButtonRelease);
            moveSubMenuButtons.standard.addEventListener('click', () => setMoveMode('standard'));
            moveSubMenuButtons.x.addEventListener('click', () => setMoveMode('x-only'));
            moveSubMenuButtons.z.addEventListener('click', () => setMoveMode('z-only'));
            moveSubMenuButtons.y.addEventListener('click', () => setMoveMode('y-only'));
            
            rulerSubMenu = document.getElementById('ruler-submenu');
            rulerSubMenuButtons.straight = document.getElementById('btn-ruler-straight');
            rulerSubMenuButtons.curved = document.getElementById('btn-ruler-curved');

            toolMenuButtons.ruler.addEventListener('pointerdown', handleRulerButtonPress);
            toolMenuButtons.ruler.addEventListener('pointerup', handleRulerButtonRelease);

            rulerSubMenuButtons.straight.addEventListener('click', () => setRulerMode('straight'));
            rulerSubMenuButtons.curved.addEventListener('click', () => setRulerMode('curved'));
            
            // --- Ruler Snap Listeners RESTORED ---
            rulerSnapSubMenuButtons.center = document.getElementById('btn-ruler-snap-center');
            rulerSnapSubMenuButtons.corner = document.getElementById('btn-ruler-snap-corner');
            rulerSnapSubMenuButtons.center.addEventListener('click', () => setRulerSnapMode('center'));
            rulerSnapSubMenuButtons.corner.addEventListener('click', () => setRulerSnapMode('corner'));
            // --- End Restore ---

            document.querySelectorAll('#ruler-colors .color-swatch').forEach(swatch => {
                swatch.addEventListener('click', (e) => {
                    setRulerColor(e.target.dataset.color, e.target);
                });
            });

            toolMenuButtons.tool3.addEventListener('click', () => setTool('tool3'));
            // --- End Tool Menu Listeners ---

            // --- Global Submenu Closer (Kept) ---
            window.addEventListener('pointerdown', (event) => {
                if (moveSubMenu.style.display === 'block' && 
                    !moveSubMenu.contains(event.target) && 
                    event.target !== toolMenuButtons.move) {
                    hideMoveSubMenu();
                }
                if (rulerSubMenu.style.display === 'block' && 
                    !rulerSubMenu.contains(event.target) && 
                    event.target !== toolMenuButtons.ruler) {
                    hideRulerSubMenu();
                }
            }, true); 

            // --- NEW HUD Panel Logic ---
            const hudOverlay = document.getElementById('hud-panel-overlay');
            const hudButtons = document.querySelectorAll('#player-hud .hud-button');
            const closeButtons = document.querySelectorAll('.close-panel-btn');

            hudButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const panelId = button.dataset.panel;
                    document.querySelectorAll('.hud-panel').forEach(p => p.classList.add('hidden'));

                    renderHUD(); // refresh sheet from latest character data

                    // Show overlay: must drop the `hidden` class (display:none !important)
                    // AND set display, since the class would otherwise override the inline style.
                    hudOverlay.classList.remove('hidden');
                    hudOverlay.style.display = 'flex';
                    document.getElementById(panelId).classList.remove('hidden');
                });
            });

            function closeAllPanels() {
                hudOverlay.classList.add('hidden');
                hudOverlay.style.display = 'none';
                document.querySelectorAll('.hud-panel').forEach(p => p.classList.add('hidden'));
            }

            closeButtons.forEach(btn => btn.addEventListener('click', closeAllPanels));
            hudOverlay.addEventListener('click', (e) => {
                if (e.target === hudOverlay) {
                    closeAllPanels();
                }
            });
            // --- End New HUD Panel Logic ---

            // --- Start Animation ---
            animate();
            
            // O mapa chega do servidor assim que o jogador faz login (ver initSocket).
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerDown(event) { // Não mais assíncrona
            if (isDraggingHeight) {
                isDraggingHeight = false;
                controls.enabled = true; 
                deselectObject();
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const allObjects = [plane, ...objects]; 
            const intersects = raycaster.intersectObjects(allObjects, true); 

            if (intersects.length > 0) {
                const firstIntersect = intersects[0];
                
                let clickedObject = null;
                let topLevelObject = firstIntersect.object;
                
                while (topLevelObject.parent && topLevelObject.parent !== scene) {
                    topLevelObject = topLevelObject.parent;
                }
                clickedObject = objects.find(obj => obj === topLevelObject);

                if (clickedObject) {
                    // Clicked an object (token, character, etc.)
                    if (currentTool === 'move' && currentMoveMode === 'y-only') {
                        selectObject(clickedObject);
                        isDraggingHeight = true;
                        controls.enabled = false; 
                    } else {
                        if (selectedObject === clickedObject) {
                            deselectObject();
                        } else {
                            selectObject(clickedObject);
                        }
                    }
                } else if (firstIntersect.object.name === "tabletop") {
                    // Clicked the tabletop
                    const intersectPoint = firstIntersect.point;
                    const snappedPosition = snapToGrid(intersectPoint);

                    switch (currentTool) {
                        case 'move':
                            if (selectedObject) {
                                // Emitir o movimento para o servidor (mapa partilhado)
                                const docId = selectedObject.userData.syncId;
                                if (docId && socket) {
                                    const finalPosition = snapToGrid(selectedObject.position);
                                    socket.emit('move-object', {
                                        id: docId,
                                        position: {
                                            x: finalPosition.x,
                                            y: selectedObject.position.y, // Manter o Y
                                            z: finalPosition.z
                                        }
                                    });
                                }
                                controls.target.copy(selectedObject.position);
                                deselectObject();
                            }
                            break;
                        case 'ruler':
                            const rulerSnappedPosition = getRulerSnapPosition(intersectPoint);
                            if (rulerPoints.length === 0) {
                                rulerTooltip.style.display = 'none';
                            }
                            const now = new Date().getTime();
                            if (now - lastRulerClickTime < 300) { 
                                finalizeRulerLine();
                            } else {
                                rulerPoints.push(rulerSnappedPosition); 
                            }
                            lastRulerClickTime = now;
                            break;
                    }
                }
            }
        }

        function onPointerMove(event) {
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;

            if (isDraggingHeight && selectedObject) {
                const deltaY = event.movementY * -0.01; 
                selectedObject.position.y += deltaY;

                const halfHeight = selectedObject.userData.halfHeight || 0;
                if (selectedObject.position.y < halfHeight) {
                    selectedObject.position.y = halfHeight;
                }
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;

                if (currentTool === 'move' && selectedObject) {
                    const snappedPosition = snapToGrid(intersectPoint); 
                    moveObject(selectedObject, snappedPosition);
                }

                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                    const rulerSnapPos = getRulerSnapPosition(intersectPoint);
                    const previewPoints = [...rulerPoints, rulerSnapPos];
                    updateRuler(previewPoints); 
                    updateRulerTooltip(previewPoints, false);
                } else if (currentTool === 'ruler') {
                    updateRulerTooltip([], false, true); // Pass 'showAtZero'
                }
            }
        }

        function onContextMenu(event) { // Não mais assíncrona
            event.preventDefault(); 
            if (currentTool !== 'ruler') return;
            
            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;
                const snappedPosition = getRulerSnapPosition(intersectPoint); 

               if (rulerPoints.length > 0) {
                   finalizeRulerLine(false); // Finalizar mas não limpar (false)
               }
                
                rulerPoints = [snappedPosition]; // Começar novo array de pontos
               lastRulerClickTime = new Date().getTime(); 
            }
        }

        function onKeyDown(event) {
            // Sem delete para jogadores
            if (event.key === "Escape") {
                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                   clearInProgressRuler();
                } else if (isDraggingHeight) {
                    isDraggingHeight = false;
                    controls.enabled = true;
                    deselectObject();
                } else if (selectedObject) {
                    deselectObject();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        function snapToGrid(position) {
            const snappedX = Math.round(position.x / gridCellSize) * gridCellSize;
            const snappedZ = Math.round(position.z / gridCellSize) * gridCellSize;
            return new THREE.Vector3(snappedX, position.y, snappedZ);
        }

        function getRulerSnapPosition(rawPosition) {
            let snappedX, snappedZ;
            if (currentRulerSnapMode === 'center') {
                snappedX = (Math.floor(rawPosition.x / gridCellSize) + 0.5) * gridCellSize;
                snappedZ = (Math.floor(rawPosition.z / gridCellSize) + 0.5) * gridCellSize;
            } else { // 'corner'
                snappedX = Math.round(rawPosition.x / gridCellSize) * gridCellSize;
                snappedZ = Math.round(rawPosition.z / gridCellSize) * gridCellSize;
            }
            return new THREE.Vector3(snappedX, 0.02, snappedZ); 
        }

        // --- Object Management ---
        
        // --- NEW: createObjectFromData (Usado localmente) ---
        function createObjectFromData(id, data) {
            let objectMesh;
            let halfHeight = 0.5;
            
            switch (data.type) {
                case 'token':
                    const cylGeom = new THREE.CylinderGeometry(gridCellSize * 0.4, gridCellSize * 0.4, 0.2, 32);
                    objectMesh = new THREE.Mesh(cylGeom, defaultMaterial.clone());
                    halfHeight = 0.1;
                    break;
                case 'cube':
                    const cubeGeom = new THREE.BoxGeometry(gridCellSize * 0.8, gridCellSize * 0.8, gridCellSize * 0.8);
                    objectMesh = new THREE.Mesh(cubeGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'sphere':
                    const sphGeom = new THREE.SphereGeometry(gridCellSize * 0.4, 32, 32);
                    objectMesh = new THREE.Mesh(sphGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'character':
                    if (data.characterData) {
                        objectMesh = createCharacterModel(data.characterData);
                        const heightScale = data.characterData.appearance.height || 1;
                        halfHeight = (1 * heightScale) / 2 * 0.4; // Escalonado
                    }
                    break;
                default:
                    return; // Tipo desconhecido
            }

            if (objectMesh) {
                objectMesh.position.set(data.position.x, data.position.y, data.position.z);
                objectMesh.castShadow = true;
                objectMesh.receiveShadow = true;
                objectMesh.userData.halfHeight = halfHeight;
                objectMesh.userData.syncId = id; // VINCULAR AO ID DE SINCRONIA
                
                if (data.type === 'character') {
                    objectMesh.userData.characterData = data.characterData;
                } else {
                    objectMesh.userData.objectType = data.type;
                }
                
                scene.add(objectMesh);
                objects.push(objectMesh);
            }
        }
        // --- END NEW ---

        function selectObject(object) {
            deselectObject(); 
            selectedObject = object;
            
            if (selectedObject.userData.characterData) {
                // Não mudar material
            } else {
                selectedObject.material = selectedMaterial;
            }
        }

        function deselectObject() {
            if (selectedObject) {
                if (!selectedObject.userData.characterData) {
                    if (!selectedObject.material) {
                         selectedObject.material = defaultMaterial.clone();
                    } else {
                        selectedObject.material = defaultMaterial;
                    }
                }
            }
            selectedObject = null;
        }

        function moveObject(object, newPosition) {
            if (!object) return;
            const halfHeight = object.userData.halfHeight || 0;
            
            switch (currentMoveMode) {
                case 'standard':
                    object.position.x = newPosition.x;
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight); 
                    break;
                case 'x-only':
                    object.position.x = newPosition.x;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'z-only':
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'y-only':
                    break;
            }
        }
        // --- End Object Management ---
        
        // --- Character Model Functions (per-part colors + proportions; mirrors GM screen) ---
        const BASE_TORSO_HEIGHT = 1;
        const BASE_HEAD_RADIUS = 0.4;
        const BASE_ARM_LENGTH = 0.8;

        function charColors(charData) {
            const c = (charData.appearance && charData.appearance.colors) || {};
            const legacy = charData.color || '#dd4444';
            return {
                skin: c.skin || '#c68642',
                hair: c.hair || '#3b2716',
                torso: c.torso || legacy,
                legs: c.legs || '#3a3f4a',
                eyes: c.eyes || '#111111'
            };
        }

        function createCharacterModel(charData) {
            const modelGroup = new THREE.Group();
            const col = charColors(charData);
            const skinMat = new THREE.MeshLambertMaterial({ color: col.skin });
            const torsoMat = new THREE.MeshLambertMaterial({ color: col.torso });
            const legsMat = new THREE.MeshLambertMaterial({ color: col.legs });
            const hairMat = new THREE.MeshLambertMaterial({ color: col.hair });
            const eyeMat = new THREE.MeshBasicMaterial({ color: col.eyes });

            const add = (geo, mat, name) => { const m = new THREE.Mesh(geo, mat); m.name = name; modelGroup.add(m); return m; };
            add(new THREE.CylinderGeometry(0.3, 0.3, BASE_TORSO_HEIGHT, 32), torsoMat, 'torso');
            add(new THREE.SphereGeometry(BASE_HEAD_RADIUS, 32, 32), skinMat, 'head');
            add(new THREE.SphereGeometry(BASE_HEAD_RADIUS * 1.02, 24, 16, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat, 'hair');
            add(new THREE.SphereGeometry(0.05, 16, 16), eyeMat, 'leftEye');
            add(new THREE.SphereGeometry(0.05, 16, 16), eyeMat, 'rightEye');
            add(new THREE.CylinderGeometry(0.08, 0.08, BASE_ARM_LENGTH, 16), skinMat, 'leftArm');
            add(new THREE.CylinderGeometry(0.08, 0.08, BASE_ARM_LENGTH, 16), skinMat, 'rightArm');
            add(new THREE.CylinderGeometry(0.1, 0.1, 0.9, 16), legsMat, 'leftLeg');
            add(new THREE.CylinderGeometry(0.1, 0.1, 0.9, 16), legsMat, 'rightLeg');

            updateCharacterAppearance(modelGroup, charData.appearance || {});
            modelGroup.scale.set(0.4, 0.4, 0.4);
            return modelGroup;
        }

        function updateCharacterAppearance(modelGroup, appearance) {
            const H = appearance.height || 1;
            const B = appearance.build || 1;
            const HS = appearance.headSize || 1;
            const AL = appearance.armLength || 1;
            const LL = appearance.legLength || 1;
            const g = (n) => modelGroup.getObjectByName(n);
            const torso = g('torso'), head = g('head'), hair = g('hair'),
                  leftEye = g('leftEye'), rightEye = g('rightEye'),
                  leftArm = g('leftArm'), rightArm = g('rightArm'),
                  leftLeg = g('leftLeg'), rightLeg = g('rightLeg');

            torso.scale.set(B, H, B);
            torso.position.y = (BASE_TORSO_HEIGHT * H) / 2 - 0.5;
            head.scale.set(HS, HS, HS);
            const hr = BASE_HEAD_RADIUS * HS;
            head.position.y = (BASE_TORSO_HEIGHT * H) + hr - 0.5;
            if (hair) { hair.scale.set(HS, HS, HS); hair.position.y = head.position.y; }
            leftEye.position.set(-0.13 * HS, head.position.y + 0.1 * HS, hr - 0.05);
            rightEye.position.set(0.13 * HS, head.position.y + 0.1 * HS, hr - 0.05);
            leftArm.scale.set(B, AL, B); rightArm.scale.set(B, AL, B);
            const ay = torso.position.y + (BASE_TORSO_HEIGHT * H / 2) - (BASE_ARM_LENGTH * AL / 2);
            leftArm.position.set(-0.4 * B, ay, 0); rightArm.position.set(0.4 * B, ay, 0);
            leftLeg.scale.set(B, LL, B); rightLeg.scale.set(B, LL, B);
            const ly = torso.position.y - (BASE_TORSO_HEIGHT * H / 2);
            leftLeg.position.set(-0.15 * B, ly, 0); rightLeg.position.set(0.15 * B, ly, 0);
        }
        // --- End Character Model Functions ---

        // --- Phase 4: Character sheet HUD rendering ---
        function activeChar() {
            return myCharacters.find(c => c.id === activeCharId) || myCharacters[0] || null;
        }

        function deriveSheet(char) {
            const base = char.abilities || char.stats || { str:10, dex:10, con:10, int:10, wis:10, cha:10 };
            const classes = char.classes || [];
            const finals = SRD.finalAbilities(base, char.race, char.subrace, char.racialChoice || []);
            const mods = {}; for (const a of ABILITIES) mods[a] = abilityMod(finals[a]);
            const total = SRD.totalLevel(classes);
            const prof = proficiencyBonus(total);
            const saves = SRD.saveProficiencies(classes);
            const granted = new Set([...SRD.raceSkillGrants(char.race).fixed, ...SRD.backgroundSkillGrants(char.background)]);
            const proficient = new Set([...granted, ...(char.skills || [])]);
            const maxHP = SRD.maxHP(classes, mods.con);
            const eq = char.equipment || {};
            const acInfo = SRD.armorClass({ armorIdx: eq.armor, shield: eq.shield, dexMod: mods.dex, classes, conMod: mods.con, wisMod: mods.wis });
            const spellInfo = SRD.spellSlots(classes);
            spellInfo.casters.forEach(c => { c.dc = 8 + prof + (mods[c.ability] || 0); c.atk = prof + (mods[c.ability] || 0); });
            const pp = 10 + mods.wis + (proficient.has('perception') ? prof : 0);
            return { base, finals, mods, total, prof, saves, proficient, maxHP,
                ac: acInfo.ac, acSource: acInfo.source, spellInfo, speed: SRD.speed(char.race), init: mods.dex, pp };
        }

        function getCurrentHP(charId, maxHP) {
            if (hpState[charId] == null) {
                const stored = sessionStorage.getItem('vtt_hp_' + charId);
                hpState[charId] = stored != null ? Math.min(+stored, maxHP) : maxHP;
            }
            return Math.max(0, Math.min(hpState[charId], maxHP));
        }
        function setCurrentHP(charId, value, maxHP) {
            hpState[charId] = Math.max(0, Math.min(value, maxHP));
            sessionStorage.setItem('vtt_hp_' + charId, hpState[charId]);
        }

        function renderHUD() {
            const cc = document.getElementById('char-content');
            const ic = document.getElementById('inv-content');
            const sc = document.getElementById('spells-content');
            const ac = document.getElementById('actions-content');
            if (!cc) return;
            if (!SRD) { const m = '<p class="muted">Loading character data…</p>'; cc.innerHTML = ic.innerHTML = sc.innerHTML = ac.innerHTML = m; return; }
            const char = activeChar();
            if (!char) {
                const m = '<p class="muted">No character is assigned to you yet. Build one in the Character Creator (the “/” page) and it will appear here.</p>';
                cc.innerHTML = ic.innerHTML = sc.innerHTML = ac.innerHTML = m;
                document.getElementById('char-title').textContent = 'Character';
                return;
            }
            const d = deriveSheet(char);
            renderCharPanel(char, d);
            renderInvPanel(char, d);
            renderSpellsPanel(char, d);
            renderActionsPanel(char, d);
        }

        function selectorHTML(activeId) {
            if (myCharacters.length <= 1) return '';
            const opts = myCharacters.map(c => `<option value="${escHtml(c.id)}" ${c.id === activeId ? 'selected' : ''}>${escHtml(c.name || 'Unnamed')}</option>`).join('');
            return `<select id="char-select" class="char-select">${opts}</select>`;
        }

        function renderCharPanel(char, d) {
            const cc = document.getElementById('char-content');
            const cur = getCurrentHP(char.id, d.maxHP);
            const pct = d.maxHP > 0 ? Math.round((cur / d.maxHP) * 100) : 0;
            const race = SRD.get('races', char.race);
            const sub = char.subrace && SRD.get('subraces', char.subrace);
            const classTxt = (char.classes || []).map(c => {
                const cl = SRD.get('classes', c.class); const s = c.subclass && SRD.get('subclasses', c.subclass);
                return `${escHtml(cl ? cl.name : c.class)} ${c.level}${s ? ` (${escHtml(s.name)})` : ''}`;
            }).join(' / ') || '—';
            document.getElementById('char-title').innerHTML = `${escHtml(char.name || 'Unnamed')} <span class="sheet-sub">${escHtml(sub ? sub.name : (race ? race.name : ''))} · ${classTxt}</span>`;

            const metrics = [
                ['HP', `${cur}/${d.maxHP}`], ['AC', d.ac], ['Speed', d.speed],
                ['Init', fmtMod(d.init)], ['Prof', fmtMod(d.prof)], ['PP', d.pp]
            ].map(([l, v]) => `<div class="metric-card"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');

            const abilities = ABILITIES.map(a => {
                const isSave = d.saves.has(a);
                return `<div class="ability-cell"><div class="ab-name">${a.toUpperCase()}</div><div class="ab-score">${d.finals[a]}</div><div class="ab-mod">${fmtMod(d.mods[a])}</div><div class="ab-save">save ${fmtMod(d.mods[a] + (isSave ? d.prof : 0))}${isSave ? ' ✓' : ''}</div></div>`;
            }).join('');

            const skills = SRD.skills.slice().sort((a, b) => a.name.localeCompare(b.name)).map(sk => {
                const ab = sk.ability_score.index;
                const isProf = d.proficient.has(sk.index);
                const bonus = d.mods[ab] + (isProf ? d.prof : 0);
                return `<div class="row-item"><span>${isProf ? '●' : '<span style="color:#555">○</span>'} ${escHtml(sk.name)} <span class="tag">${ab}</span></span><b>${fmtMod(bonus)}</b></div>`;
            }).join('');

            cc.innerHTML = `${selectorHTML(char.id)}
                <div class="metrics-row">${metrics}</div>
                <div class="stat-bar-group">
                    <label>Hit Points</label>
                    <div class="stat-bar-outer"><div class="stat-bar-inner" style="width:${pct}%; background-color:${pct < 30 ? '#d14444' : (pct < 60 ? '#d1a544' : '#44d17a')};"></div></div>
                    <span>${cur} / ${d.maxHP}</span>
                    <div class="hp-controls">
                        <button class="dmg" data-hp="-5">−5</button>
                        <button class="dmg" data-hp="-1">−1</button>
                        <button class="heal" data-hp="1">+1</button>
                        <button class="heal" data-hp="5">+5</button>
                        <button data-hp="full">Full</button>
                    </div>
                </div>
                <h4>Abilities</h4>
                <div class="ability-grid">${abilities}</div>
                <h4>Skills</h4>
                ${skills}`;

            const sel = document.getElementById('char-select');
            if (sel) sel.onchange = e => { activeCharId = e.target.value; renderHUD(); };
            cc.querySelectorAll('.hp-controls button').forEach(btn => btn.onclick = () => {
                const v = btn.dataset.hp;
                if (v === 'full') setCurrentHP(char.id, d.maxHP, d.maxHP);
                else setCurrentHP(char.id, getCurrentHP(char.id, d.maxHP) + (+v), d.maxHP);
                renderCharPanel(char, d);
            });
        }

        function renderInvPanel(char, d) {
            const ic = document.getElementById('inv-content');
            const eq = char.equipment || {};
            const armor = eq.armor ? SRD.get('equipment', eq.armor) : null;
            const armorTxt = armor ? armor.name : 'None';
            const weapons = (eq.weapons || []).map(wi => {
                const w = SRD.get('equipment', wi); if (!w) return '';
                const a = SRD.weaponAttack(w, d.mods, char.classes || [], d.prof);
                return `<div class="row-item"><span>${escHtml(w.name)} <span class="tag">${a.ranged ? 'ranged ' + a.range : 'melee'}</span></span><b>${fmtMod(a.attack)} · ${a.damage}${a.versatile ? ' (' + a.versatile + ' 2H)' : ''} ${escHtml(a.damageType)}</b></div>`;
            }).join('') || '<p class="muted">No weapons.</p>';
            const gear = (eq.items || []).map(gi => SRD.get('equipment', gi)).filter(Boolean)
                .map(g => `<div class="row-item"><span>${escHtml(g.name)}</span></div>`).join('') || '<p class="muted">No gear.</p>';
            ic.innerHTML = `
                <h4>Armor</h4>
                <div class="row-item"><span>${escHtml(armorTxt)}${eq.shield ? ' + Shield' : ''}</span><b>AC ${d.ac}</b></div>
                <div class="muted" style="margin-top:4px;">${escHtml(d.acSource)}</div>
                <h4>Weapons</h4>${weapons}
                <h4>Gear</h4>${gear}`;
        }

        function renderSpellsPanel(char, d) {
            const sc = document.getElementById('spells-content');
            const casters = (char.classes || []).filter(c => SRD.isCaster(c.class));
            if (!casters.length) { sc.innerHTML = '<p class="muted">This character has no spellcasting classes.</p>'; return; }
            const si = d.spellInfo;
            const slotLine = Object.entries(si.slots).filter(([l, n]) => n > 0).map(([l, n]) => `L${l}×${n}`).join('  ·  ');
            const pactLine = si.pact ? `Pact ${si.pact.count}×L${si.pact.level}` : '';
            const casterSummary = si.casters.map(ci => {
                const cl = SRD.get('classes', ci.class);
                return `<div class="row-item"><span>${escHtml(cl ? cl.name : ci.class)} <span class="tag">${ci.ability ? ci.ability.toUpperCase() : ''}</span></span><b>DC ${ci.dc} · atk ${fmtMod(ci.atk)}</b></div>`;
            }).join('');
            const known = (char.spells || []).map(x => SRD.get('spells', x)).filter(Boolean).sort((a, b) => a.level - b.level || a.name.localeCompare(b.name));
            const byLevel = {};
            known.forEach(s => { (byLevel[s.level] = byLevel[s.level] || []).push(s); });
            const spellSections = Object.keys(byLevel).map(Number).sort((a, b) => a - b).map(lv => {
                const label = lv === 0 ? 'Cantrips' : `Level ${lv}`;
                const items = byLevel[lv].map(s => `<div class="row-item"><span>${escHtml(s.name)}${s.concentration ? ' <span class="tag">C</span>' : ''}${s.ritual ? ' <span class="tag">R</span>' : ''}</span></div>`).join('');
                return `<details class="spell-lvl" open><summary>${label} <span class="muted">(${byLevel[lv].length})</span></summary>${items}</details>`;
            }).join('') || '<p class="muted">No spells known. Add them in the Character Creator.</p>';
            sc.innerHTML = `
                <div class="row-item"><span>Spell slots</span><b>${slotLine || '—'}${pactLine ? '  ·  ' + pactLine : ''}</b></div>
                <h4>Spellcasting</h4>${casterSummary}
                <h4>Known / Prepared</h4>${spellSections}`;
        }

        function renderActionsPanel(char, d) {
            const ac = document.getElementById('actions-content');
            const eq = char.equipment || {};
            const attacks = (eq.weapons || []).map(wi => {
                const w = SRD.get('equipment', wi); if (!w) return '';
                const a = SRD.weaponAttack(w, d.mods, char.classes || [], d.prof);
                return `<div class="row-item"><span>${escHtml(w.name)} <span class="tag">${a.ranged ? 'ranged ' + a.range : 'melee'}</span></span><b>${fmtMod(a.attack)} to hit · ${a.damage} ${escHtml(a.damageType)}</b></div>`;
            }).join('') || '<p class="muted">No weapon attacks.</p>';
            const standard = ['Attack', 'Cast a Spell', 'Dash', 'Disengage', 'Dodge', 'Help', 'Hide', 'Ready', 'Search', 'Use an Object']
                .map(x => `<div class="row-item"><span>${x}</span></div>`).join('');
            ac.innerHTML = `
                <h4>Attacks</h4>${attacks}
                <h4>Standard Actions</h4>${standard}
                <div class="muted" style="margin-top:8px;">Bonus actions &amp; reactions depend on your class features and prepared spells.</div>`;
        }
        // --- End Phase 4 sheet rendering ---

        // --- UI Management (Left Menu) ---
        function setTool(toolName) {
            if (currentTool === 'ruler' && toolName !== 'ruler') {
                clearRuler();
            }
            if (toolName !== 'ruler') {
                rulerTooltip.style.display = 'none';
            }
            currentTool = toolName;
            
            for (const key in toolMenuButtons) {
                if (key === toolName || (key === 'ruler' && toolName === 'ruler')) { 
                    toolMenuButtons[key].classList.add('active');
                } else {
                    toolMenuButtons[key].classList.remove('active');
                }
            }
        }

        // --- Move Tool Logic ---
        function setMoveMode(mode) {
            currentMoveMode = mode;
            setTool('move'); 
            for (const key in moveSubMenuButtons) {
                if (key === mode || (key === 'standard' && mode === 'standard')) {
                    moveSubMenuButtons[key].classList.add('active');
                } else {
                    moveSubMenuButtons[key].classList.remove('active');
                }
            }
            hideMoveSubMenu();
        }
        function handleMoveButtonPress(event) {
            isLongPress = false;
            movePressTimer = setTimeout(() => {
                isLongPress = true;
                showMoveSubMenu();
            }, 1000); 
        }
        function handleMoveButtonRelease(event) {
            clearTimeout(movePressTimer);
            if (!isLongPress) {
                setMoveMode('standard');
            }
        }
        function showMoveSubMenu() {
            moveSubMenu.style.display = 'block';
        }
        function hideMoveSubMenu() {
            moveSubMenu.style.display = 'none';
        }
        // --- End Move Tool Logic ---

        // --- Ruler Tool Logic ---
        function setRulerMode(mode) {
            currentRulerMode = mode;
            setTool('ruler');
            rulerSubMenuButtons.straight.classList.toggle('active', mode === 'straight');
            rulerSubMenuButtons.curved.classList.toggle('active', mode === 'curved');
        }
        function setRulerSnapMode(mode) { // RESTAURADA
            currentRulerSnapMode = mode;
            rulerSnapSubMenuButtons.center.classList.toggle('active', mode === 'center');
            rulerSnapSubMenuButtons.corner.classList.toggle('active', mode ==='corner');
        }
        function setRulerColor(colorValue, clickedButton) {
            currentRulerColor = parseInt(colorValue); 
            rulerLineMaterial.color.setHex(currentRulerColor);
            rulerPreviewMaterial.color.setHex(currentRulerColor);
            document.querySelectorAll('#ruler-colors .color-swatch').forEach(swatch => {
                swatch.classList.remove('active');
            });
            clickedButton.classList.add('active');
        }
        function handleRulerButtonPress(event) {
            isRulerLongPress = false;
            rulerPressTimer = setTimeout(() => {
                isRulerLongPress = true;
                showRulerSubMenu();
            }, 1000); 
        }
        function handleRulerButtonRelease(event) {
            clearTimeout(rulerPressTimer);
            if (!isRulerLongPress) {
                setRulerMode(currentRulerMode);
            }
        }
        function showRulerSubMenu() {
            rulerSubMenu.style.display = 'block';
        }
        function hideRulerSubMenu() {
            rulerSubMenu.style.display = 'none';
        }
        function calculateLineLength(points) {
            let totalLength = 0;
            if (!points || points.length < 2) return 0;
            for (let i = 0; i < points.length - 1; i++) {
                totalLength += points[i].distanceTo(points[i+1]);
            }
            return totalLength;
        }
        function updateRulerTooltip(points, isFinal = false, showAtZero = false) {
            if (!rulerTooltip) return;
            
            if (showAtZero && points.length === 0) {
                rulerTooltip.style.display = 'block';
                rulerTooltip.textContent = '0 ft';
                rulerTooltip.style.left = `${lastMouseX}px`;
                rulerTooltip.style.top = `${lastMouseY}px`;
                return;
            }
            if (points.length < 2) {
                rulerTooltip.style.display = 'none';
                return;
            }
            let totalLength = 0;
            if (currentRulerMode === 'curved' && points.length > 1) {
                const curve = new THREE.CatmullRomCurve3(points, false, 'centripetal', 0.5);
                totalLength = curve.getLength();
            } else {
                totalLength = calculateLineLength(points);
            }
            const lengthInFeet = (totalLength / gridCellSize) * FEET_PER_GRID_CELL;
            rulerTooltip.style.display = 'block';
            rulerTooltip.style.left = `${lastMouseX}px`;
            rulerTooltip.style.top = `${lastMouseY}px`;
            if (isFinal) {
                rulerTooltip.textContent = `Total: ${lengthInFeet.toFixed(1)} ft`;
            } else {
                rulerTooltip.textContent = `${lengthInFeet.toFixed(1)} ft`;
            }
        }
        function updateRuler(previewPoints) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (previewPoints.length < 2) return;
            let geometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(previewPoints, false, 'centripetal', 0.5);
               geometryPoints = curve.getPoints(previewPoints.length * 10); 
           } else {
               geometryPoints = previewPoints;
           }
           const lineGeometry = new THREE.BufferGeometry().setFromPoints(geometryPoints);
           currentRulerLine = new THREE.Line(lineGeometry, rulerPreviewMaterial);
           currentRulerLine.material.color.setHex(currentRulerColor);
           currentRulerLine.computeLineDistances(); 
           scene.add(currentRulerLine);
        }
        
        // --- NEW: createRulerLineFromData (usado localmente) ---
        function createRulerLineFromData(id, data) {
            const points = data.points.map(p => new THREE.Vector3(p.x, p.y, p.z));
            const finalGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const finalLine = new THREE.Line(finalGeometry, rulerLineMaterial.clone());
            finalLine.material.color.setHex(data.color);
            finalLine.userData.syncId = id; // Vincular ao ID de sincronia
            finalLine.userData.rulerData = data; 
            
            rulerSegments.push(finalLine);
            scene.add(finalLine);
        }
        
        // --- MODIFIED: finalizeRulerLine agora salva localmente ---
        function finalizeRulerLine(shouldClearPoints = true) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (rulerPoints.length < 2) {
               clearInProgressRuler();
               return; 
           }
           let finalGeometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(rulerPoints, false, 'centripetal', 0.5);
               finalGeometryPoints = curve.getPoints(rulerPoints.length * 10);
           } else {
               finalGeometryPoints = rulerPoints;
           }
           
           updateRulerTooltip(finalGeometryPoints, true);

           // Emitir para o servidor; o listener 'ruler-added' criará a linha partilhada
           const dataToSave = {
                points: finalGeometryPoints.map(p => ({x: p.x, y: p.y, z: p.z})),
                mode: currentRulerMode,
                color: currentRulerColor
            };
           if (socket) socket.emit('add-ruler', dataToSave);

           if (shouldClearPoints) {
                clearInProgressRuler();
           }
        }
        
       function clearInProgressRuler() {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
               currentRulerLine = null;
           }
           rulerPoints = [];
           lastRulerClickTime = 0;
           rulerTooltip.style.display = 'none'; 
        }
        
        // --- MODIFIED: clearRuler agora limpa localmente ---
        function clearRuler() {
           clearInProgressRuler(); // Limpar pré-visualização local

           // Emitir para o servidor; o listener 'rulers-cleared' fará a remoção da cena
           if (socket) socket.emit('clear-rulers');

           rulerTooltip.style.display = 'none';
        }
        // --- End Ruler Tool Logic ---
        
        // --- Socket.IO: receive and share the GM's map in real time ---
        function initSocket(username) {
            socket = io();

            socket.on('connect', () => {
                console.log('Conectado ao servidor com ID:', socket.id);
                socket.emit('login', username);
                sessionStorage.setItem('vtt_username', username);
            });

            socket.on('login-success', (userData) => {
                console.log('Jogador autenticado:', userData);
                if (loginOverlay) loginOverlay.classList.add('hidden');
            });

            // --- Phase 4: character data for the HUD ---
            socket.on('load-user-characters', (chars) => {
                myCharacters = Array.isArray(chars) ? chars : [];
                if (!myCharacters.find(c => c.id === activeCharId)) {
                    activeCharId = myCharacters[0] ? myCharacters[0].id : null;
                }
                renderHUD();
            });

            socket.on('load-homebrew', (hb) => {
                pendingHomebrew = hb;
                if (SRD) { SRD.setHomebrew(hb); renderHUD(); }
            });

            socket.on('character-updated', (char) => {
                if (!char || !char.id) return;
                const i = myCharacters.findIndex(c => c.id === char.id);
                if (i >= 0) myCharacters[i] = char;
                else if (char.owner === username || (username && username.toLowerCase() === 'gm')) myCharacters.push(char);
                renderHUD();
            });

            socket.on('character-deleted', (charId) => {
                myCharacters = myCharacters.filter(c => c.id !== charId);
                if (activeCharId === charId) activeCharId = myCharacters[0] ? myCharacters[0].id : null;
                renderHUD();
            });

            // Estado completo do mapa ao conectar
            socket.on('map-state', (data) => {
                objects.forEach(obj => scene.remove(obj));
                objects = [];
                rulerSegments.forEach(seg => scene.remove(seg));
                rulerSegments = [];

                data.objects.forEach(objData => createObjectFromData(objData.id, objData));
                data.rulers.forEach(rulerData => createRulerLineFromData(rulerData.id, rulerData));
            });

            socket.on('object-added', (data) => {
                if (!objects.find(o => o.userData.syncId === data.id)) {
                    createObjectFromData(data.id, data);
                }
            });

            socket.on('object-moved', (data) => {
                const object = objects.find(o => o.userData.syncId === data.id);
                if (object) {
                    object.position.set(data.position.x, data.position.y, data.position.z);
                }
            });

            socket.on('object-deleted', (data) => {
                const object = objects.find(o => o.userData.syncId === data.id);
                if (object) {
                    if (selectedObject === object) deselectObject();
                    scene.remove(object);
                    objects = objects.filter(o => o.userData.syncId !== data.id);
                }
            });

            socket.on('ruler-added', (data) => {
                if (!rulerSegments.find(s => s.userData.syncId === data.id)) {
                    createRulerLineFromData(data.id, data);
                }
            });

            socket.on('rulers-cleared', () => {
                rulerSegments.forEach(segment => {
                    scene.remove(segment);
                    segment.geometry.dispose();
                });
                rulerSegments = [];
            });

            socket.on('error', (message) => {
                console.error('Erro do servidor:', message);
                showLoginError(message);
                if (loginBtn) {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            });

            socket.on('disconnect', () => {
                console.log('Desconectado do servidor.');
            });
        }

        // --- Login handling ---
        const loginOverlay = document.getElementById('login-overlay');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const loginError = document.getElementById('login-error');

        function showLoginError(message) {
            if (!loginError) return;
            loginError.textContent = message;
            loginError.classList.remove('hidden');
            setTimeout(() => loginError.classList.add('hidden'), 3000);
        }

        function handleLogin() {
            const username = usernameInput.value.trim();
            if (!username || username.length < 2) {
                showLoginError('Username must be at least 2 characters');
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = 'Connecting...';
            initSocket(username);
        }

        loginBtn.addEventListener('click', handleLogin);
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Auto-login if a username is already stored for this tab's session
        const storedUsername = sessionStorage.getItem('vtt_username');
        if (storedUsername) {
            usernameInput.value = storedUsername;
            handleLogin();
        }

        // --- Init ---
        try {
            init();
        } catch (e) {
            console.error('Fatal Error on Init:', e);
        }

        // Load SRD data for the character-sheet HUD (independent of the 3D scene).
        loadSRD().then(srd => {
            SRD = srd;
            if (pendingHomebrew) SRD.setHomebrew(pendingHomebrew);
            renderHUD();
        }).catch(e => console.error('Failed to load SRD data:', e));
        
    </script>
</body>
</html>
