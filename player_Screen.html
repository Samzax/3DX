<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D VTT - Player Screen (Local)</title>
    <style>
          #login-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }

  #login-modal {
    background-color: #2d2d2d;
    border: 2px solid #555;
    border-radius: 12px;
    padding: 40px;
    width: 90%;
    max-width: 400px;
    color: #f0f0f0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  }

  #login-modal h2 {
    margin-top: 0;
    color: #60A5FA;
    text-align: center;
    margin-bottom: 30px;
  }

  #login-modal input {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    background-color: #1a1a1a;
    border: 1px solid #444;
    border-radius: 6px;
    color: #f0f0f0;
    font-size: 16px;
  }

  #login-modal input:focus {
    outline: none;
    border-color: #60A5FA;
  }

  #login-modal button {
    width: 100%;
    padding: 12px;
    background-color: #60A5FA;
    color: #1a1a1a;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  #login-modal button:hover {
    background-color: #3b82f6;
  }

  #login-modal button:disabled {
    background-color: #555;
    cursor: not-allowed;
  }

  #login-error {
    color: #ff4444;
    margin-top: 10px;
    text-align: center;
    font-size: 14px;
  }

  .hidden {
    display: none !important;
  }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #f0f0f0;
            overflow: hidden; /* Hide scrollbars */
            cursor: crosshair; /* Default cursor for tabletop */
        }
        #scene-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: absolute; /* Add position for z-index */
            top: 0;
            left: 0;
            z-index: 1; /* Send 3D scene to back */
        }
        
        /* --- Left Tool Menu (Kept) --- */
        #tool-menu {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 10;
        }

        .tool-button {
            width: 48px;
            height: 48px;
            padding: 8px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            user-select: none; /* Prevent text selection on long press */
            position: relative; /* For submenu positioning */
        }
        .tool-button:hover {
            background-color: #777;
        }
        .tool-button.active {
            background-color: #007bff;
        }

        #move-submenu {
            display: none; /* Hidden by default */
            position: absolute;
            left: 105%; /* Position to the right of the button */
            top: 0;
            width: 150px;
            background-color: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 100;
        }
        #move-submenu .menu-button,
        #ruler-submenu .menu-button { /* Added ruler button style */
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: background-color 0.2s;
        }
        #move-submenu .menu-button:hover,
        #ruler-submenu .menu-button:hover {
            background-color: #777;
        }
        #move-submenu .menu-button:last-child,
        #ruler-submenu .menu-button:last-child {
            margin-bottom: 0;
        }
        #move-submenu .menu-button.active,
        #ruler-submenu .menu-button.active {
            background-color: #007bff;
            font-weight: bold;
        }
        /* --- End Left Menu Styles --- */

        /* --- Color Swatch Styles (Kept for Ruler) --- */
        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #555;
            cursor: pointer;
            padding: 0;
            background-clip: content-box; 
        }
        .color-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 5px #fff;
        }

        /* --- Ruler Tooltip Style (Kept) --- */
        #ruler-tooltip {
            position: absolute;
            display: none; 
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none; 
            z-index: 101;
            transform: translate(10px, -35px); 
            white-space: nowrap;
        }

        /* --- NEW Player HUD (Bottom) Styles --- */
        #player-hud {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #444;
            z-index: 20;
        }
        .hud-button {
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .hud-button:hover {
            background-color: #777;
        }

        /* --- NEW HUD Panel (Modal) Styles --- */
        #hud-panel-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.6);
            display: none; /* BUG FIX: Começa escondido */
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .hud-panel {
            background-color: #2d2d2d;
            border: 1px solid #555;
            border-radius: 10px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            color: #f0f0f0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hud-panel h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .close-panel-btn {
            background-color: #555;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 20px;
            float: right;
        }
        .close-panel-btn:hover {
            background-color: #777;
        }
        .hidden {
            display: none;
        }
        
        /* --- NEW Stat Bar Styles (for HP/Mana) --- */
        .stat-bar-group {
            margin-bottom: 15px;
        }
        .stat-bar-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
            color: #aaa;
        }
        .stat-bar-outer {
            width: 100%;
            height: 20px;
            background-color: #4a4a4a;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .stat-bar-inner {
            height: 100%;
            background-color: #d14444; /* Default red for HP */
            border-radius: 10px 0 0 10px;
            transition: width 0.3s ease;
        }
        .stat-bar-group span {
            display: block;
            text-align: right;
            font-size: 12px;
            margin-top: 4px;
            color: #ccc;
        }

    </style>

    <!-- Import Map for Three.js -->

    {
        "imports": {
            "three": "https://cdn.skypack.dev/three@0.132.2/build/three.module.js",

        }
    }
    </script>
</head>
<body>
    <!-- Login Modal -->
<div id="login-overlay">

    <!-- This container holds the 3D scene -->
    <div id="scene-container"></div>
    
    <!-- Loading Overlay REMOVED -->
    
    <!-- --- Left Tool Menu (Kept) --- -->
    <div id="tool-menu">
        <div id="tool-move-wrapper" style="position: relative;">
            <button id="btn-tool-move" class="tool-button" title="Move Tool (Hold for options)">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24" 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
            </button>
            <div id="move-submenu">
                <button id="btn-move-standard" class="menu-button">Standard (X/Z)</button>
                <button id="btn-move-x" class="menu-button">X-Axis Only</button>
                <button id="btn-move-z" class="menu-button">Z-Axis Only</button>
                <button id="btn-move-y" class="menu-button">Y-Axis (Height)</button>
            </div>
        </div>
        
        <button id="btn-tool-ruler" class="tool-button" title="Ruler Tool (Hold for options)">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="21" x2="21" y2="3"></line><path d="M11.5 12.5l3 3"></path><path d="M8.5 15.5l3 3"></path><path d="M5.5 18.5l3 3"></path><path d="M12.5 11.5l3-3"></path><path d="M15.5 8.5l3-3"></path><path d="M18.5 5.5l3-3"></path></svg>
        </button>
        <div id="ruler-submenu" style="display: none; position: absolute; left: 105%; top: 56px; width: 150px; background-color: rgba(0, 0, 0, 0.85); padding: 10px; border-radius: 8px; border: 1px solid #444; z-index: 100;">
            <button id="btn-ruler-straight" class="menu-button active">Straight Line</button>
            <button id="btn-ruler-curved" class="menu-button">Curved Line</button>
            <div id="ruler-colors" style="display: flex; gap: 8px; margin-top: 10px; border-top: 1px solid #444; padding-top: 10px; justify-content: center;">
                <button class="color-swatch active" data-color="0x00ffff" style="background-color: #00ffff;" title="Cyan"></button>
                <button class="color-swatch" data-color="0xff00ff" style="background-color: #ff00ff;" title="Magenta"></button>
                <button class="color-swatch" data-color="0xffff00" style="background-color: #ffff00;" title="Yellow"></button>

            </div>
            <!-- --- Snap Mode Buttons RESTORED --- -->
            <div id="ruler-snap-mode" style="margin-top: 10px; border-top: 1px solid #444; padding-top: 10px;">
                <button id="btn-ruler-snap-center" class="menu-button active" style="font-size: 13px;">Snap: Center</button>
                <button id="btn-ruler-snap-corner" class="menu-button" style="font-size: 13px;">Snap: Corner</button>
            </div>

        </div>

        <button id="btn-tool-3" class="tool-button" title="Tool 3">T3</button>
    </div>
    <!-- --- End Tool Menu --- -->
    
    <!-- --- Ruler Tooltip HTML (Kept) --- -->
    <div id="ruler-tooltip">0 ft</div>

    <!-- --- NEW Player HUD (Bottom) --- -->
    <div id="player-hud">
        <button class="hud-button" data-panel="char-panel">Character</button>
        <button class="hud-button" data-panel="inv-panel">Inventory</button>
        <button class="hud-button" data-panel="spells-panel">Spells</button>
        <button class="hud-button" data-panel="actions-panel">Actions</button>

    <!-- --- NEW HUD Panel Modals --- -->
    <div id="hud-panel-overlay" class="hidden"> 
        
        <!-- Character Panel -->
        <div id="char-panel" class="hud-panel hidden">
            <h3>Character Stats</h3>

            <div class="stat-bar-group">

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // --- Firebase Imports REMOVED ---

        let scene, camera, renderer, controls;
        let plane, grid;
        let raycaster, mouse;
        let objects = []; 
        let selectedObject = null; 
        
        // --- Firebase State REMOVED ---
        
        // --- NEW: Local Storage Key ---
        const LOCAL_MAP_KEY = 'vtt_map_data_player'; // Chave específica do Jogador
        // --- END NEW ---
        
        let currentTool = null; 
        let currentMoveMode = 'standard'; 
        let toolMenuButtons = {};
        let moveSubMenuButtons = {};
        let moveSubMenu;
        let movePressTimer = null;
        let isLongPress = false;
        let isDraggingHeight = false; 

        let currentRulerMode = 'straight'; 
        let currentRulerColor = 0x00ffff; 
        let rulerSubMenu, rulerSubMenuButtons = {};
        let rulerPressTimer = null;
        let isRulerLongPress = false;
        let rulerPoints = []; 
        let currentRulerLine = null; 
        let rulerSegments = []; 
        let lastRulerClickTime = 0; 
        
        // --- Snap Mode Variables RESTORED ---
        let currentRulerSnapMode = 'center'; 
        let rulerSnapSubMenuButtons = {};
        // --- End Restore ---
        
        let rulerTooltip;
        let lastMouseX = 0;
        let lastMouseY = 0;

        const gridSize = 1000; 
        const gridDivisions = 1000; 
        const gridCellSize = gridSize / gridDivisions; 
        const FEET_PER_GRID_CELL = 5; 

        // --- Materials (Simplified) ---
        const defaultMaterial = new THREE.MeshLambertMaterial({ color: 0xdd4444 }); 
        const selectedMaterial = new THREE.MeshLambertMaterial({ color: 0xffff44, emissive: 0xaaaa00 }); 
        const rulerLineMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2, transparent: true, opacity: 0.8 });
        const rulerPreviewMaterial = new THREE.LineDashedMaterial({ 
            color: 0x00ffff, 
            linewidth: 1, 
            transparent: true, 
            opacity: 0.7, 
            dashSize: 0.2, 
            gapSize: 0.1 
        });
        // --- NEW: Materials for Characters ---
        const characterBaseMaterial = new THREE.MeshLambertMaterial({ color: 0xdd4444 });
        const characterEyeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        // --- End New ---

        // --- Firebase Functions REMOVED ---

        function init() {
            // --- Scene Setup ---
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x2d2d2d);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000); 
            camera.position.set(20, 30, 20); 
            camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('scene-container').appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;
            controls.maxPolarAngle = Math.PI / 2.1; 
            controls.target.set(0, 0, 0);
            const ambientLight = new THREE.AmbientLight(0xaaaaaa, 1.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 3);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 500;
            dirLight.shadow.camera.bottom = -500;
            dirLight.shadow.camera.left = -500;
            dirLight.shadow.camera.right = 500;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);
            const planeGeometry = new THREE.PlaneGeometry(gridSize, gridSize);
            const planeMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x4a4a4a, 
                side: THREE.DoubleSide
            });
            plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2; 
            plane.receiveShadow = true;
            plane.name = "tabletop";
            scene.add(plane);
            grid = new THREE.GridHelper(gridSize, gridDivisions, 0x888888, 0x888888);
            grid.material.opacity = 0.5;
            grid.material.transparent = true;
            grid.position.y = 0.01; 
            scene.add(grid);
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            rulerTooltip = document.getElementById('ruler-tooltip');
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            renderer.domElement.addEventListener('contextmenu', onContextMenu);
            window.addEventListener('keydown', onKeyDown); 

            // --- Tool Menu Listeners (Left - Kept) ---
            toolMenuButtons.move = document.getElementById('btn-tool-move');
            toolMenuButtons.ruler = document.getElementById('btn-tool-ruler');
            toolMenuButtons.tool3 = document.getElementById('btn-tool-3');
            moveSubMenu = document.getElementById('move-submenu');
            moveSubMenuButtons.standard = document.getElementById('btn-move-standard');
            moveSubMenuButtons.x = document.getElementById('btn-move-x');
            moveSubMenuButtons.z = document.getElementById('btn-move-z');
            moveSubMenuButtons.y = document.getElementById('btn-move-y');

            toolMenuButtons.move.addEventListener('pointerdown', handleMoveButtonPress);
            toolMenuButtons.move.addEventListener('pointerup', handleMoveButtonRelease);
            moveSubMenuButtons.standard.addEventListener('click', () => setMoveMode('standard'));
            moveSubMenuButtons.x.addEventListener('click', () => setMoveMode('x-only'));
            moveSubMenuButtons.z.addEventListener('click', () => setMoveMode('z-only'));
            moveSubMenuButtons.y.addEventListener('click', () => setMoveMode('y-only'));
            
            rulerSubMenu = document.getElementById('ruler-submenu');
            rulerSubMenuButtons.straight = document.getElementById('btn-ruler-straight');
            rulerSubMenuButtons.curved = document.getElementById('btn-ruler-curved');

            toolMenuButtons.ruler.addEventListener('pointerdown', handleRulerButtonPress);
            toolMenuButtons.ruler.addEventListener('pointerup', handleRulerButtonRelease);

            rulerSubMenuButtons.straight.addEventListener('click', () => setRulerMode('straight'));
            rulerSubMenuButtons.curved.addEventListener('click', () => setRulerMode('curved'));
            
            // --- Ruler Snap Listeners RESTORED ---
            rulerSnapSubMenuButtons.center = document.getElementById('btn-ruler-snap-center');
            rulerSnapSubMenuButtons.corner = document.getElementById('btn-ruler-snap-corner');
            rulerSnapSubMenuButtons.center.addEventListener('click', () => setRulerSnapMode('center'));
            rulerSnapSubMenuButtons.corner.addEventListener('click', () => setRulerSnapMode('corner'));
            // --- End Restore ---

            document.querySelectorAll('#ruler-colors .color-swatch').forEach(swatch => {
                swatch.addEventListener('click', (e) => {
                    setRulerColor(e.target.dataset.color, e.target);
                });
            });

            toolMenuButtons.tool3.addEventListener('click', () => setTool('tool3'));
            // --- End Tool Menu Listeners ---

            // --- Global Submenu Closer (Kept) ---
            window.addEventListener('pointerdown', (event) => {
                if (moveSubMenu.style.display === 'block' && 
                    !moveSubMenu.contains(event.target) && 
                    event.target !== toolMenuButtons.move) {
                    hideMoveSubMenu();
                }
                if (rulerSubMenu.style.display === 'block' && 
                    !rulerSubMenu.contains(event.target) && 
                    event.target !== toolMenuButtons.ruler) {
                    hideRulerSubMenu();
                }
            }, true); 

            // --- NEW HUD Panel Logic ---
            const hudOverlay = document.getElementById('hud-panel-overlay');
            const hudButtons = document.querySelectorAll('#player-hud .hud-button');
            const closeButtons = document.querySelectorAll('.close-panel-btn');

            hudButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const panelId = button.dataset.panel;
                    document.querySelectorAll('.hud-panel').forEach(p => p.classList.add('hidden'));
                    
                    // --- BUG FIX: Ativar overlay com display: flex ---
                    hudOverlay.style.display = 'flex';
                    // --- End Bug Fix ---
                    document.getElementById(panelId).classList.remove('hidden');
                });
            });

            function closeAllPanels() {
                // --- BUG FIX: Esconder overlay com display: none ---
                hudOverlay.style.display = 'none';
                // --- End Bug Fix ---
                document.querySelectorAll('.hud-panel').forEach(p => p.classList.add('hidden'));
            }

            closeButtons.forEach(btn => btn.addEventListener('click', closeAllPanels));
            hudOverlay.addEventListener('click', (e) => {
                if (e.target === hudOverlay) {
                    closeAllPanels();
                }
            });
            // --- End New HUD Panel Logic ---

            // --- Start Animation ---
            animate();
            
            // --- NEW: Load from Local Storage ---
            loadMapFromLocalStorage();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerDown(event) { // Não mais assíncrona
            if (isDraggingHeight) {
                isDraggingHeight = false;
                controls.enabled = true; 
                deselectObject();
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const allObjects = [plane, ...objects]; 
            const intersects = raycaster.intersectObjects(allObjects, true); 

            if (intersects.length > 0) {
                const firstIntersect = intersects[0];
                
                let clickedObject = null;
                let topLevelObject = firstIntersect.object;
                
                while (topLevelObject.parent && topLevelObject.parent !== scene) {
                    topLevelObject = topLevelObject.parent;
                }
                clickedObject = objects.find(obj => obj === topLevelObject);

                if (clickedObject) {
                    // Clicked an object (token, character, etc.)
                    if (currentTool === 'move' && currentMoveMode === 'y-only') {
                        selectObject(clickedObject);
                        isDraggingHeight = true;
                        controls.enabled = false; 
                    } else {
                        if (selectedObject === clickedObject) {
                            deselectObject();
                        } else {
                            selectObject(clickedObject);
                        }
                    }
                } else if (firstIntersect.object.name === "tabletop") {
                    // Clicked the tabletop
                    const intersectPoint = firstIntersect.point;
                    const snappedPosition = snapToGrid(intersectPoint);

                    switch (currentTool) {
                        case 'move':
                            if (selectedObject) {
                                // --- MODIFIED: Salvar no localStorage ao largar ---
                                const finalPosition = snapToGrid(selectedObject.position);
                                selectedObject.position.x = finalPosition.x;
                                selectedObject.position.y = selectedObject.position.y;
                                selectedObject.position.z = finalPosition.z;
                                saveMapToLocalStorage();
                                // --- END MODIFIED ---
                                controls.target.copy(selectedObject.position); 
                                deselectObject();
                            }
                            break;
                        case 'ruler':
                            const rulerSnappedPosition = getRulerSnapPosition(intersectPoint);
                            if (rulerPoints.length === 0) {
                                rulerTooltip.style.display = 'none';
                            }
                            const now = new Date().getTime();
                            if (now - lastRulerClickTime < 300) { 
                                finalizeRulerLine();
                            } else {
                                rulerPoints.push(rulerSnappedPosition); 
                            }
                            lastRulerClickTime = now;
                            break;
                    }
                }
            }
        }

        function onPointerMove(event) {
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;

            if (isDraggingHeight && selectedObject) {
                const deltaY = event.movementY * -0.01; 
                selectedObject.position.y += deltaY;

                const halfHeight = selectedObject.userData.halfHeight || 0;
                if (selectedObject.position.y < halfHeight) {
                    selectedObject.position.y = halfHeight;
                }
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;

                if (currentTool === 'move' && selectedObject) {
                    const snappedPosition = snapToGrid(intersectPoint); 
                    moveObject(selectedObject, snappedPosition);
                }

                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                    const rulerSnapPos = getRulerSnapPosition(intersectPoint);
                    const previewPoints = [...rulerPoints, rulerSnapPos];
                    updateRuler(previewPoints); 
                    updateRulerTooltip(previewPoints, false);
                } else if (currentTool === 'ruler') {
                    updateRulerTooltip([], false, true); // Pass 'showAtZero'
                }
            }
        }

        function onContextMenu(event) { // Não mais assíncrona
            event.preventDefault(); 
            if (currentTool !== 'ruler') return;
            
            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;
                const snappedPosition = getRulerSnapPosition(intersectPoint); 

               if (rulerPoints.length > 0) {
                   finalizeRulerLine(false); // Finalizar mas não limpar (false)
               }
                
                rulerPoints = [snappedPosition]; // Começar novo array de pontos
               lastRulerClickTime = new Date().getTime(); 
            }
        }

        function onKeyDown(event) {
            // Sem delete para jogadores
            if (event.key === "Escape") {
                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                   clearInProgressRuler();
                } else if (isDraggingHeight) {
                    isDraggingHeight = false;
                    controls.enabled = true;
                    deselectObject();
                } else if (selectedObject) {
                    deselectObject();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        function snapToGrid(position) {
            const snappedX = Math.round(position.x / gridCellSize) * gridCellSize;
            const snappedZ = Math.round(position.z / gridCellSize) * gridCellSize;
            return new THREE.Vector3(snappedX, position.y, snappedZ);
        }

        function getRulerSnapPosition(rawPosition) {
            let snappedX, snappedZ;
            if (currentRulerSnapMode === 'center') {
                snappedX = (Math.floor(rawPosition.x / gridCellSize) + 0.5) * gridCellSize;
                snappedZ = (Math.floor(rawPosition.z / gridCellSize) + 0.5) * gridCellSize;
            } else { // 'corner'
                snappedX = Math.round(rawPosition.x / gridCellSize) * gridCellSize;
                snappedZ = Math.round(rawPosition.z / gridCellSize) * gridCellSize;
            }
            return new THREE.Vector3(snappedX, 0.02, snappedZ); 
        }

        // --- Object Management ---
        
        // --- NEW: createObjectFromData (Usado localmente) ---
        function createObjectFromData(id, data) {
            let objectMesh;
            let halfHeight = 0.5;
            
            switch (data.type) {
                case 'token':
                    const cylGeom = new THREE.CylinderGeometry(gridCellSize * 0.4, gridCellSize * 0.4, 0.2, 32);
                    objectMesh = new THREE.Mesh(cylGeom, defaultMaterial.clone());
                    halfHeight = 0.1;
                    break;
                case 'cube':
                    const cubeGeom = new THREE.BoxGeometry(gridCellSize * 0.8, gridCellSize * 0.8, gridCellSize * 0.8);
                    objectMesh = new THREE.Mesh(cubeGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'sphere':
                    const sphGeom = new THREE.SphereGeometry(gridCellSize * 0.4, 32, 32);
                    objectMesh = new THREE.Mesh(sphGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'character':
                    if (data.characterData) {
                        objectMesh = createCharacterModel(data.characterData);
                        const heightScale = data.characterData.appearance.height || 1;
                        halfHeight = (1 * heightScale) / 2 * 0.4; // Escalonado
                    }
                    break;
                default:
                    return; // Tipo desconhecido
            }

            if (objectMesh) {
                objectMesh.position.set(data.position.x, data.position.y, data.position.z);
                objectMesh.castShadow = true;
                objectMesh.receiveShadow = true;
                objectMesh.userData.halfHeight = halfHeight;
                objectMesh.userData.localId = id; // VINCULAR AO ID LOCAL
                
                if (data.type === 'character') {
                    objectMesh.userData.characterData = data.characterData;
                } else {
                    objectMesh.userData.objectType = data.type;
                }
                
                scene.add(objectMesh);
                objects.push(objectMesh);
            }
        }
        // --- END NEW ---

        function selectObject(object) {
            deselectObject(); 
            selectedObject = object;
            
            if (selectedObject.userData.characterData) {
                // Não mudar material
            } else {
                selectedObject.material = selectedMaterial;
            }
        }

        function deselectObject() {
            if (selectedObject) {
                if (!selectedObject.userData.characterData) {
                    if (!selectedObject.material) {
                         selectedObject.material = defaultMaterial.clone();
                    } else {
                        selectedObject.material = defaultMaterial;
                    }
                }
            }
            selectedObject = null;
        }

        function moveObject(object, newPosition) {
            if (!object) return;
            const halfHeight = object.userData.halfHeight || 0;
            
            switch (currentMoveMode) {
                case 'standard':
                    object.position.x = newPosition.x;
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight); 
                    break;
                case 'x-only':
                    object.position.x = newPosition.x;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'z-only':
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'y-only':
                    break;
            }
        }
        // --- End Object Management ---
        
        // --- NEW: Character Model Functions (Copied from GM) ---
        const BASE_TORSO_HEIGHT = 1;
        const BASE_HEAD_RADIUS = 0.4;
        const BASE_ARM_LENGTH = 0.8;
        
        function createCharacterModel(charData) {
            const modelGroup = new THREE.Group();
            const modelMaterial = characterBaseMaterial.clone();
            modelMaterial.color.set(charData.color);

            const torsoGeo = new THREE.CylinderGeometry(0.3, 0.3, BASE_TORSO_HEIGHT, 32);
            const torso = new THREE.Mesh(torsoGeo, modelMaterial);
            torso.name = 'torso';
            modelGroup.add(torso);
            const headGeo = new THREE.SphereGeometry(BASE_HEAD_RADIUS, 32, 32);
            const head = new THREE.Mesh(headGeo, modelMaterial);
            head.name = 'head';
            modelGroup.add(head);
            const eyeGeo = new THREE.SphereGeometry(0.05, 16, 16);
            const leftEye = new THREE.Mesh(eyeGeo, characterEyeMaterial);
            leftEye.name = 'leftEye';
            modelGroup.add(leftEye);
            const rightEye = new THREE.Mesh(eyeGeo, characterEyeMaterial);
            rightEye.name = 'rightEye';
            modelGroup.add(rightEye);
            const armGeo = new THREE.CylinderGeometry(0.08, 0.08, BASE_ARM_LENGTH, 16);
            const leftArm = new THREE.Mesh(armGeo, modelMaterial);
            leftArm.name = 'leftArm';
            modelGroup.add(leftArm);
            const rightArm = new THREE.Mesh(armGeo, modelMaterial);
            rightArm.name = 'rightArm';
            modelGroup.add(rightArm);
            const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.9, 16); 
            const leftLeg = new THREE.Mesh(legGeo, modelMaterial);
            leftLeg.name = 'leftLeg';
            modelGroup.add(leftLeg);
            const rightLeg = new THREE.Mesh(legGeo, modelMaterial);
            rightLeg.name = 'rightLeg';
            modelGroup.add(rightLeg);

            updateCharacterAppearance(modelGroup, charData.appearance);
            modelGroup.scale.set(0.4, 0.4, 0.4); 
            return modelGroup;
        }

        function updateCharacterAppearance(modelGroup, appearance) {
            const heightScale = appearance.height || 1;
            const headScale = appearance.headSize || 1;
            const armScale = appearance.armLength || 1;
            
            const torso = modelGroup.getObjectByName('torso');
            const head = modelGroup.getObjectByName('head');
            const leftEye = modelGroup.getObjectByName('leftEye');
            const rightEye = modelGroup.getObjectByName('rightEye');
            const leftArm = modelGroup.getObjectByName('leftArm');
            const rightArm = modelGroup.getObjectByName('rightArm');
            const leftLeg = modelGroup.getObjectByName('leftLeg');
            const rightLeg = modelGroup.getObjectByName('rightLeg');

            torso.scale.y = heightScale;
            torso.position.y = (BASE_TORSO_HEIGHT * heightScale) / 2 - 0.5; 
            head.scale.set(headScale, headScale, headScale);
            const scaledHeadRadius = BASE_HEAD_RADIUS * headScale;
            head.position.y = (BASE_TORSO_HEIGHT * heightScale) + scaledHeadRadius - 0.5;
            leftEye.position.y = head.position.y + (0.1 * headScale);
            rightEye.position.y = head.position.y + (0.1 * headScale);
            leftEye.position.z = (scaledHeadRadius - 0.05);
            rightEye.position.z = (scaledHeadRadius - 0.05);
            leftArm.scale.y = armScale;
            rightArm.scale.y = armScale;
            leftArm.position.y = torso.position.y + (BASE_TORSO_HEIGHT * heightScale / 2) - (BASE_ARM_LENGTH * armScale / 2);
            rightArm.position.y = torso.position.y + (BASE_TORSO_HEIGHT * heightScale / 2) - (BASE_ARM_LENGTH * armScale / 2);
            leftArm.position.x = -0.4;
            rightArm.position.x = 0.4;
            leftLeg.position.y = torso.position.y - (BASE_TORSO_HEIGHT * heightScale / 2);
            rightLeg.position.y = torso.position.y - (BASE_TORSO_HEIGHT * heightScale / 2);
            leftLeg.position.x = -0.15;
            rightLeg.position.x = 0.15;
        }
        // --- End New Character Model Functions ---

        // --- UI Management (Left Menu) ---
        function setTool(toolName) {
            if (currentTool === 'ruler' && toolName !== 'ruler') {
                clearRuler();
            }
            if (toolName !== 'ruler') {
                rulerTooltip.style.display = 'none';
            }
            currentTool = toolName;
            
            for (const key in toolMenuButtons) {
                if (key === toolName || (key === 'ruler' && toolName === 'ruler')) { 
                    toolMenuButtons[key].classList.add('active');
                } else {
                    toolMenuButtons[key].classList.remove('active');
                }
            }
        }

        // --- Move Tool Logic ---
        function setMoveMode(mode) {
            currentMoveMode = mode;
            setTool('move'); 
            for (const key in moveSubMenuButtons) {
                if (key === mode || (key === 'standard' && mode === 'standard')) {
                    moveSubMenuButtons[key].classList.add('active');
                } else {
                    moveSubMenuButtons[key].classList.remove('active');
                }
            }
            hideMoveSubMenu();
        }
        function handleMoveButtonPress(event) {
            isLongPress = false;
            movePressTimer = setTimeout(() => {
                isLongPress = true;
                showMoveSubMenu();
            }, 1000); 
        }
        function handleMoveButtonRelease(event) {
            clearTimeout(movePressTimer);
            if (!isLongPress) {
                setMoveMode('standard');
            }
        }
        function showMoveSubMenu() {
            moveSubMenu.style.display = 'block';
        }
        function hideMoveSubMenu() {
            moveSubMenu.style.display = 'none';
        }
        // --- End Move Tool Logic ---

        // --- Ruler Tool Logic ---
        function setRulerMode(mode) {
            currentRulerMode = mode;
            setTool('ruler');
            rulerSubMenuButtons.straight.classList.toggle('active', mode === 'straight');
            rulerSubMenuButtons.curved.classList.toggle('active', mode === 'curved');
        }
        function setRulerSnapMode(mode) { // RESTAURADA
            currentRulerSnapMode = mode;
            rulerSnapSubMenuButtons.center.classList.toggle('active', mode === 'center');
            rulerSnapSubMenuButtons.corner.classList.toggle('active', mode ==='corner');
        }
        function setRulerColor(colorValue, clickedButton) {
            currentRulerColor = parseInt(colorValue); 
            rulerLineMaterial.color.setHex(currentRulerColor);
            rulerPreviewMaterial.color.setHex(currentRulerColor);
            document.querySelectorAll('#ruler-colors .color-swatch').forEach(swatch => {
                swatch.classList.remove('active');
            });
            clickedButton.classList.add('active');
        }
        function handleRulerButtonPress(event) {
            isRulerLongPress = false;
            rulerPressTimer = setTimeout(() => {
                isRulerLongPress = true;
                showRulerSubMenu();
            }, 1000); 
        }
        function handleRulerButtonRelease(event) {
            clearTimeout(rulerPressTimer);
            if (!isRulerLongPress) {
                setRulerMode(currentRulerMode);
            }
        }
        function showRulerSubMenu() {
            rulerSubMenu.style.display = 'block';
        }
        function hideRulerSubMenu() {
            rulerSubMenu.style.display = 'none';
        }
        function calculateLineLength(points) {
            let totalLength = 0;
            if (!points || points.length < 2) return 0;
            for (let i = 0; i < points.length - 1; i++) {
                totalLength += points[i].distanceTo(points[i+1]);
            }
            return totalLength;
        }
        function updateRulerTooltip(points, isFinal = false, showAtZero = false) {
            if (!rulerTooltip) return;
            
            if (showAtZero && points.length === 0) {
                rulerTooltip.style.display = 'block';
                rulerTooltip.textContent = '0 ft';
                rulerTooltip.style.left = `${lastMouseX}px`;
                rulerTooltip.style.top = `${lastMouseY}px`;
                return;
            }
            if (points.length < 2) {
                rulerTooltip.style.display = 'none';
                return;
            }
            let totalLength = 0;
            if (currentRulerMode === 'curved' && points.length > 1) {
                const curve = new THREE.CatmullRomCurve3(points, false, 'centripetal', 0.5);
                totalLength = curve.getLength();
            } else {
                totalLength = calculateLineLength(points);
            }
            const lengthInFeet = (totalLength / gridCellSize) * FEET_PER_GRID_CELL;
            rulerTooltip.style.display = 'block';
            rulerTooltip.style.left = `${lastMouseX}px`;
            rulerTooltip.style.top = `${lastMouseY}px`;
            if (isFinal) {
                rulerTooltip.textContent = `Total: ${lengthInFeet.toFixed(1)} ft`;
            } else {
                rulerTooltip.textContent = `${lengthInFeet.toFixed(1)} ft`;
            }
        }
        function updateRuler(previewPoints) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (previewPoints.length < 2) return;
            let geometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(previewPoints, false, 'centripetal', 0.5);
               geometryPoints = curve.getPoints(previewPoints.length * 10); 
           } else {
               geometryPoints = previewPoints;
           }
           const lineGeometry = new THREE.BufferGeometry().setFromPoints(geometryPoints);
           currentRulerLine = new THREE.Line(lineGeometry, rulerPreviewMaterial);
           currentRulerLine.material.color.setHex(currentRulerColor);
           currentRulerLine.computeLineDistances(); 
           scene.add(currentRulerLine);
        }
        
        // --- NEW: createRulerLineFromData (usado localmente) ---
        function createRulerLineFromData(id, data) {
            const points = data.points.map(p => new THREE.Vector3(p.x, p.y, p.z));
            const finalGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const finalLine = new THREE.Line(finalGeometry, rulerLineMaterial.clone());
            finalLine.material.color.setHex(data.color);
            finalLine.userData.localId = id; // Vincular ao ID local
            finalLine.userData.rulerData = data; 
            
            rulerSegments.push(finalLine);
            scene.add(finalLine);
        }
        
        // --- MODIFIED: finalizeRulerLine agora salva localmente ---
        function finalizeRulerLine(shouldClearPoints = true) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (rulerPoints.length < 2) {
               clearInProgressRuler();
               return; 
           }
           let finalGeometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(rulerPoints, false, 'centripetal', 0.5);
               finalGeometryPoints = curve.getPoints(rulerPoints.length * 10);
           } else {
               finalGeometryPoints = rulerPoints;
           }
           
           updateRulerTooltip(finalGeometryPoints, true);
           
           // Criar localmente
           const dataToSave = {
                points: finalGeometryPoints.map(p => ({x: p.x, y: p.y, z: p.z})),
                mode: currentRulerMode,
                color: currentRulerColor
            };
           const localId = crypto.randomUUID();
           createRulerLineFromData(localId, dataToSave);
           
           if (shouldClearPoints) {
                clearInProgressRuler();
           }
           saveMapToLocalStorage(); // Salvar
        }
        
       function clearInProgressRuler() {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
               currentRulerLine = null;
           }
           rulerPoints = [];
           lastRulerClickTime = 0;
           rulerTooltip.style.display = 'none'; 
        }
        
        // --- MODIFIED: clearRuler agora limpa localmente ---
        function clearRuler() {
           clearInProgressRuler(); // Limpar pré-visualização local
            
            // Limpar da cena
            rulerSegments.forEach(segment => {
                scene.remove(segment);
                segment.geometry.dispose();
            });
            rulerSegments = [];
            rulerTooltip.style.display = 'none'; 
            saveMapToLocalStorage(); // Salvar a remoção
        }
        // --- End Ruler Tool Logic ---
        
        // --- NEW: Local Storage Functions ---
        function saveMapToLocalStorage() {
            try {
                // Serializar objetos
                const serializableObjects = objects.map(obj => {
                    const data = {
                        position: { x: obj.position.x, y: obj.position.y, z: obj.position.z },
                        type: obj.userData.objectType,
                        characterData: obj.userData.characterData,
                        localId: obj.userData.localId
                    };
                    return data;
                });
                
                // Serializar réguas
                const serializableRulers = rulerSegments.map(seg => {
                    return {
                        ...seg.userData.rulerData,
                        localId: seg.userData.localId
                    };
                });
                
                const mapData = {
                    objects: serializableObjects,
                    rulers: serializableRulers
                };
                
                localStorage.setItem(LOCAL_MAP_KEY, JSON.stringify(mapData));
                
            } catch (e) {
                console.error("Erro ao salvar mapa no localStorage:", e);
            }
        }
        
        function loadMapFromLocalStorage() {
            try {
                const mapDataString = localStorage.getItem(LOCAL_MAP_KEY);
                if (!mapDataString) {
                    return; // Nenhum mapa salvo
                }
                
                const mapData = JSON.parse(mapDataString);
                
                // Limpar cena atual (objetos)
                objects.forEach(obj => scene.remove(obj));
                objects = [];
                // Limpar cena atual (réguas)
                rulerSegments.forEach(seg => scene.remove(seg));
                rulerSegments = [];
                
                // Carregar objetos
                if (mapData.objects) {
                    mapData.objects.forEach(objData => {
                        createObjectFromData(objData.localId, objData);
                    });
                }
                
                // Carregar réguas
                if (mapData.rulers) {
                    mapData.rulers.forEach(rulerData => {
                        createRulerLineFromData(rulerData.localId, rulerData);
                    });
                }
                
            } catch (e) {
                console.error("Erro ao carregar mapa do localStorage:", e);
            }
        }
        // --- END NEW ---

        // --- Init ---
        try {
            init();
        } catch (e) {
            console.error('Fatal Error on Init:', e);
        }
        
    </script>
</body>
</html>
