<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Creator — 3DX</title>
  <style>
    :root { --bg:#1a1a1a; --panel:#26262b; --panel2:#2f2f36; --line:#3a3a42; --accent:#60A5FA; --accent2:#3b82f6; --txt:#f0f0f0; --muted:#9aa0ac; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--txt); font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; }
    h1,h2,h3,h4 { margin:0; font-weight:600; }
    .hidden { display:none !important; }
    button { font-family:inherit; }

    /* Login */
    #login-overlay { position:fixed; inset:0; background:rgba(0,0,0,.9); display:flex; align-items:center; justify-content:center; z-index:10000; }
    #login-modal { background:#2d2d2d; border:2px solid #555; border-radius:12px; padding:40px; width:90%; max-width:400px; box-shadow:0 10px 40px rgba(0,0,0,.8); }
    #login-modal h2 { color:var(--accent); text-align:center; margin-bottom:24px; }
    #login-modal input { width:100%; padding:12px; margin-bottom:16px; background:#1a1a1a; border:1px solid #444; border-radius:6px; color:var(--txt); font-size:16px; }
    #login-modal button { width:100%; padding:12px; background:var(--accent); color:#1a1a1a; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; }
    #login-error { color:#ff5555; text-align:center; margin-top:8px; font-size:14px; }

    .wrap { max-width:1200px; margin:0 auto; padding:20px; }
    .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; flex-wrap:wrap; gap:8px; }
    .topbar .title { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:700; }
    .badge { font-size:12px; padding:3px 10px; border-radius:999px; background:rgba(96,165,250,.15); color:var(--accent); }
    .who { font-size:13px; color:var(--muted); }

    /* Tabs */
    .tabs { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
    .tab { display:flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; font-size:14px; border:1px solid var(--line); color:var(--muted); background:var(--panel); cursor:pointer; }
    .tab.active { border:2px solid var(--accent); background:rgba(96,165,250,.15); color:var(--accent); font-weight:600; }
    .tab .num { font-size:11px; opacity:.8; }

    .layout { display:grid; grid-template-columns: 1fr 340px; gap:18px; align-items:start; }
    @media (max-width: 900px){ .layout{ grid-template-columns:1fr; } }

    .panel { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; }
    .panel h2 { font-size:18px; margin-bottom:14px; }
    .rail { position:sticky; top:16px; display:flex; flex-direction:column; gap:14px; }

    label.fld { display:block; font-size:13px; color:var(--muted); margin:0 0 6px; }
    .row { margin-bottom:14px; }
    select, input[type=text], input[type=number] { width:100%; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 10px; color:var(--txt); font-size:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .class-row { display:grid; grid-template-columns: 1fr 70px 1fr 38px; gap:8px; align-items:center; margin-bottom:8px; }
    .btn { background:var(--panel2); color:var(--txt); border:1px solid var(--line); border-radius:8px; padding:9px 12px; cursor:pointer; font-size:14px; }
    .btn:hover { background:#3a3a44; }
    .btn-accent { background:var(--accent); color:#10243f; border:none; font-weight:600; }
    .btn-accent:hover { background:var(--accent2); color:#fff; }
    .btn-danger { background:#dc2626; color:#fff; border:none; }
    .btn-ghost { background:transparent; }
    .btn-sm { padding:6px 10px; font-size:13px; }
    .btn[disabled]{ opacity:.4; cursor:not-allowed; }

    .info { background:var(--panel2); border-radius:10px; padding:12px; font-size:13px; color:#cfd3da; line-height:1.5; }
    .info strong { color:#e7ebf2; }
    .feat { display:flex; gap:8px; align-items:flex-start; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-bottom:6px; font-size:13px; }
    .lvl { font-size:11px; color:var(--accent); background:rgba(96,165,250,.15); border-radius:999px; padding:2px 7px; min-width:30px; text-align:center; flex:none; }

    /* Abilities */
    .ability-row { display:grid; grid-template-columns: 1fr auto 56px auto 64px; align-items:center; gap:8px; margin-bottom:8px; }
    .stepper { width:30px; height:30px; border-radius:50%; border:none; background:#4b5563; color:#fff; font-weight:bold; cursor:pointer; }
    .stepper:disabled{ background:#374151; color:#6b7280; cursor:not-allowed; }
    .score { text-align:center; font-size:18px; font-weight:700; }
    .final { text-align:center; font-size:13px; color:var(--muted); }
    .final b { color:var(--accent); font-size:15px; }
    .seg { display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin-bottom:14px; }
    .seg button { background:var(--panel2); color:var(--muted); border:none; padding:7px 12px; cursor:pointer; font-size:13px; }
    .seg button.on { background:var(--accent); color:#10243f; font-weight:600; }
    .pool { font-size:14px; color:var(--muted); margin-bottom:12px; }
    .pool b { color:var(--accent); font-size:18px; }

    /* Skills */
    .skill-item { display:flex; align-items:center; gap:8px; padding:7px 8px; border-bottom:1px solid var(--line); font-size:14px; }
    .skill-item .sk-ability { font-size:11px; color:var(--muted); text-transform:uppercase; margin-left:auto; }
    .skill-item.locked { opacity:.7; }
    .pill { font-size:11px; padding:1px 6px; border-radius:999px; background:#3a3a44; color:var(--muted); }

    /* Appearance */
    .slider-row { display:grid; grid-template-columns: 90px 1fr 40px; align-items:center; gap:10px; margin-bottom:10px; font-size:13px; color:var(--muted); }
    .slider-row input[type=range]{ width:100%; }
    .color-row { display:grid; grid-template-columns: repeat(auto-fit,minmax(96px,1fr)); gap:10px; }
    .color-row label { font-size:12px; color:var(--muted); display:flex; flex-direction:column; gap:4px; align-items:center; }
    input[type=color]{ width:100%; height:34px; border:1px solid var(--line); border-radius:8px; background:var(--panel2); padding:2px; }

    /* Rail */
    #preview-canvas { width:100%; height:300px; border-radius:10px; background:#2b2b2b; display:block; }
    .metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .metric { background:var(--panel2); border-radius:8px; padding:8px 4px; text-align:center; }
    .metric .l { font-size:11px; color:var(--muted); }
    .metric .v { font-size:18px; font-weight:600; }
    .mods { display:grid; grid-template-columns:repeat(6,1fr); gap:4px; }
    .mods .m { background:var(--panel2); border-radius:8px; padding:6px 2px; text-align:center; font-size:11px; color:var(--muted); }
    .mods .m b { display:block; font-size:14px; color:var(--txt); }
    .saved { max-height:150px; overflow-y:auto; }
    .saved .c { display:flex; align-items:center; justify-content:space-between; padding:7px 4px; border-bottom:1px solid var(--line); font-size:13px; cursor:pointer; }
    .saved .c:hover { background:var(--panel2); }
    .saved .del { color:#f87171; background:none; border:none; cursor:pointer; font-size:13px; }
    .msg { margin-top:10px; text-align:center; font-size:14px; min-height:18px; }
    .credit { font-size:11px; color:#6b7280; margin-top:16px; text-align:center; }
    .stepnav { display:flex; justify-content:space-between; margin-top:16px; }
    .inv-row { display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; }
    .inv-row .btn-danger { padding:2px 8px; border-radius:6px; }
    .caster-block { margin-bottom:14px; }
    details { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:6px 10px; margin-bottom:8px; }
    summary { cursor:pointer; font-size:13px; color:var(--muted); }
    .spell-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:4px; margin-top:8px; }
    .spell { display:flex; align-items:center; gap:6px; font-size:13px; padding:3px 4px; border-radius:6px; cursor:pointer; }
    .spell.on { background:rgba(96,165,250,.12); }
    .red { color:#f87171; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.skypack.dev/three@0.132.2/build/three.module.js",
      "three/addons/": "https://cdn.skypack.dev/three@0.132.2/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="login-overlay">
    <div id="login-modal">
      <h2>🎲 VTT Login</h2>
      <input type="text" id="username-input" placeholder="Enter your username" autocomplete="username" maxlength="20" />
      <button id="login-btn">Login</button>
      <div id="login-error" class="hidden"></div>
    </div>
  </div>

  <div id="boot" class="wrap" style="text-align:center; color:var(--muted);">Loading SRD data…</div>

  <div id="app" class="wrap hidden">
    <div class="topbar">
      <div class="title"><span>Character creator</span><span class="badge">SRD 5.1</span></div>
      <div style="display:flex; align-items:center; gap:14px;"><a href="/homebrew" style="color:var(--accent); font-size:14px; text-decoration:none;">+ Homebrew</a><span class="who" id="who"></span></div>
    </div>

    <div class="tabs" id="tabs"></div>

    <div class="layout">
      <div class="panel" id="tab-body"></div>

      <div class="rail">
        <div class="panel" style="padding:12px;">
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="panel" style="padding:12px;">
          <div class="metrics" id="metrics"></div>
          <div class="mods" id="mods" style="margin-top:6px;"></div>
          <button class="btn btn-accent" id="save-btn" style="width:100%; margin-top:12px;">Save character</button>
          <button class="btn btn-ghost btn-sm" id="new-btn" style="width:100%; margin-top:6px;">New / clear</button>
          <div class="msg" id="msg"></div>
        </div>
        <div class="panel" style="padding:12px;">
          <h3 style="font-size:14px; margin-bottom:8px;">Saved characters</h3>
          <div class="saved" id="saved"><p style="color:var(--muted); font-size:13px;">None yet.</p></div>
        </div>
      </div>
    </div>
    <div class="credit">Game content uses the SRD 5.1 under CC BY 4.0. See data/srd/ATTRIBUTION.md.</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import {
      loadSRD, ABILITIES, ABILITY_NAMES, STANDARD_ARRAY, POINT_BUY_COST, POINT_BUY_BUDGET,
      abilityMod, fmtMod, proficiencyBonus
    } from './srd.js';

    let SRD = null;
    let pendingHomebrew = null;
    let socket = null;
    let username = null;
    let activeTab = 'identity';
    const ALL_TABS = [
      ['identity','Identity'], ['class','Class'], ['abilities','Abilities'],
      ['skills','Skills'], ['spells','Spells'], ['equipment','Equipment'],
      ['appearance','Appearance'], ['review','Review']
    ];
    function anyCaster() { return char.classes.some(c => SRD.isCaster(c.class)); }
    function TABS() { return ALL_TABS.filter(t => t[0] !== 'spells' || anyCaster()); }
    function normalizeTab() { if (activeTab === 'spells' && !anyCaster()) activeTab = 'class'; }

    const DEFAULT_COLORS = { skin:'#c68642', hair:'#3b2716', torso:'#2f6e56', legs:'#3a3f4a', eyes:'#1a1a1a' };
    const RACE_PRESETS = {
      dwarf:{ height:0.85, build:1.2, colors:{ skin:'#caa472', hair:'#6b4423' } },
      'mountain-dwarf':{ height:0.85, build:1.25 },
      halfling:{ height:0.7, build:0.9, headSize:1.1 },
      gnome:{ height:0.7, build:0.95, headSize:1.15, colors:{ hair:'#b34d3a' } },
      elf:{ height:1.05, build:0.85, colors:{ hair:'#d9c39a' } },
      'half-elf':{ height:1.0, build:0.95 },
      'half-orc':{ height:1.08, build:1.2, colors:{ skin:'#7faa6f' } },
      dragonborn:{ height:1.1, build:1.2, colors:{ skin:'#9a5b3b' } },
      tiefling:{ height:1.0, build:1.0, colors:{ skin:'#b0563f', hair:'#1a1a22' } },
      human:{ height:1.0, build:1.0 }
    };

    function defaultChar() {
      return {
        id:null, name:'',
        race:'human', subrace:null, background:'acolyte', alignment:null,
        classes:[{ class:'fighter', subclass:null, level:1 }],
        abilityMethod:'point-buy',
        baseAbilities:{ str:8, dex:8, con:8, int:8, wis:8, cha:8 },
        racialChoice:[],
        skills:[],
        appearance:{ height:1, build:1, headSize:1, armLength:1, legLength:1, colors:{ ...DEFAULT_COLORS } },
        equipment:{ armor:null, shield:false, weapons:[], items:[] },
        spells:[]
      };
    }
    let char = defaultChar();

    /* ---------- Derived stats ---------- */
    function derive() {
      const finals = SRD.finalAbilities(char.baseAbilities, char.race, char.subrace, char.racialChoice);
      const mods = {}; for (const a of ABILITIES) mods[a] = abilityMod(finals[a]);
      const total = SRD.totalLevel(char.classes);
      const prof = proficiencyBonus(total);
      const saves = SRD.saveProficiencies(char.classes);
      const granted = grantedSkills();
      const proficient = new Set([...granted, ...char.skills]);
      const hp = SRD.maxHP(char.classes, mods.con);
      const acInfo = SRD.armorClass({ armorIdx: char.equipment.armor, shield: char.equipment.shield, dexMod: mods.dex, classes: char.classes, conMod: mods.con, wisMod: mods.wis });
      const spellInfo = SRD.spellSlots(char.classes);
      spellInfo.casters.forEach(c => { c.dc = 8 + prof + (mods[c.ability]||0); c.atk = prof + (mods[c.ability]||0); });
      const perceptionBonus = mods.wis + (proficient.has('perception') ? prof : 0);
      return { finals, mods, total, prof, saves, proficient, hp, ac: acInfo.ac, acSource: acInfo.source, spellInfo,
        speed: SRD.speed(char.race), init: mods.dex, pp: 10 + perceptionBonus };
    }
    function grantedSkills() {
      const r = SRD.raceSkillGrants(char.race);
      const bg = SRD.backgroundSkillGrants(char.background);
      return new Set([...r.fixed, ...bg]);
    }

    /* ---------- Rendering ---------- */
    const $ = (id) => document.getElementById(id);
    // Escape user/homebrew text before it goes into innerHTML (shared homebrew = stored-XSS surface).
    const esc = s => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

    function renderTabs() {
      normalizeTab();
      $('tabs').innerHTML = TABS().map((t,i) =>
        `<div class="tab ${t[0]===activeTab?'active':''}" data-tab="${t[0]}"><span class="num">${i+1}</span>${t[1]}</div>`
      ).join('');
      $('tabs').querySelectorAll('.tab').forEach(el =>
        el.onclick = () => { activeTab = el.dataset.tab; renderTabs(); renderTab(); });
    }

    function opt(list, sel) {
      return list.map(o => `<option value="${esc(o.index)}" ${o.index===sel?'selected':''}>${esc(o.name)}</option>`).join('');
    }

    function renderTab() {
      normalizeTab();
      const b = $('tab-body');
      if (activeTab === 'identity') b.innerHTML = tabIdentity();
      else if (activeTab === 'class') b.innerHTML = tabClass();
      else if (activeTab === 'abilities') b.innerHTML = tabAbilities();
      else if (activeTab === 'skills') b.innerHTML = tabSkills();
      else if (activeTab === 'spells') b.innerHTML = tabSpells();
      else if (activeTab === 'equipment') b.innerHTML = tabEquipment();
      else if (activeTab === 'appearance') b.innerHTML = tabAppearance();
      else if (activeTab === 'review') b.innerHTML = tabReview();
      wireTab();
    }

    function tabIdentity() {
      const race = SRD.get('races', char.race);
      const subraces = SRD.subracesForRace(char.race);
      const rb = SRD.racialAbilityBonuses(char.race, char.subrace);
      const bonusText = Object.entries(rb.fixed).map(([a,v]) => `${a.toUpperCase()} ${fmtMod(v)}`).join(', ') || '—';
      let racialChoiceUI = '';
      if (rb.options) {
        racialChoiceUI = `<div class="row"><label class="fld">Racial ability boost — choose ${rb.options.choose} (${'+1'} each)</label>
          <div style="display:flex; flex-wrap:wrap; gap:8px;">${rb.options.from.map(a =>
            `<label class="pill" style="cursor:pointer; padding:6px 10px;"><input type="checkbox" class="rc" value="${a}" ${char.racialChoice.includes(a)?'checked':''}/> ${a.toUpperCase()}</label>`).join('')}</div></div>`;
      }
      return `<h2>Identity</h2>
        <div class="row"><label class="fld">Character name</label><input type="text" id="f-name" value="${char.name||''}" placeholder="e.g. Thorin"/></div>
        <div class="grid2">
          <div class="row"><label class="fld">Race</label><select id="f-race">${opt(SRD.races, char.race)}</select></div>
          <div class="row"><label class="fld">Subrace</label><select id="f-subrace" ${subraces.length?'':'disabled'}>
            <option value="">${subraces.length?'— none —':'(no subraces)'}</option>${opt(subraces, char.subrace)}</select></div>
        </div>
        <div class="grid2">
          <div class="row"><label class="fld">Background</label><select id="f-bg">${opt(SRD.backgrounds, char.background)}</select></div>
          <div class="row"><label class="fld">Alignment</label><select id="f-align"><option value="">— none —</option>${opt(SRD.alignments, char.alignment)}</select></div>
        </div>
        ${racialChoiceUI}
        <div class="info"><strong>${esc(race?race.name:'')}</strong> — speed ${race?race.speed:'?'} ft, size ${esc(race?race.size:'')}. Ability bonuses: ${bonusText}.
          <div style="margin-top:6px;">${race && race.traits ? race.traits.map(t=>esc(t.name)).join(' · ') : ''}</div></div>
        ${stepNav()}`;
    }

    function tabClass() {
      const total = SRD.totalLevel(char.classes);
      const rows = char.classes.map((c,i) => {
        const subs = SRD.subclassesForClass(c.class);
        const choiceLvl = SRD.subclassChoiceLevel(c.class);
        const canSub = c.level >= choiceLvl && subs.length;
        return `<div class="class-row" data-i="${i}">
          <select class="c-class">${opt(SRD.classes, c.class)}</select>
          <input type="number" class="c-level" value="${c.level}" min="1" max="20"/>
          <select class="c-sub" ${canSub?'':'disabled'}>
            <option value="">${canSub?'— subclass —':`subclass @ ${choiceLvl}`}</option>${opt(subs, c.subclass)}</select>
          <button class="btn btn-danger c-del" ${char.classes.length>1?'':'disabled'}>✕</button>
        </div>`;
      }).join('');
      const feats = SRD.classFeatures(char.classes);
      const featHTML = feats.length ? feats.map(f =>
        `<div class="feat"><span class="lvl">L${f.level}</span><div><b>${esc(f.name)}</b><div style="color:var(--muted); margin-top:2px;">${esc((f.desc||'').slice(0,160))}${(f.desc||'').length>160?'…':''}</div></div></div>`
      ).join('') : '<p style="color:var(--muted);">Pick a class to see features.</p>';
      return `<h2>Class <span style="float:right; font-size:13px; color:var(--muted); font-weight:400;">Total level ${total} · proficiency ${fmtMod(proficiencyBonus(total))}</span></h2>
        <div id="class-list">${rows}</div>
        <button class="btn btn-sm" id="add-class" ${char.classes.length<3?'':'disabled'} style="margin:6px 0 16px;">+ Add class (multiclass)</button>
        <h3 style="font-size:14px; color:var(--muted); margin-bottom:8px;">Features gained</h3>
        ${featHTML}
        ${stepNav()}`;
    }

    function tabAbilities() {
      const finals = SRD.finalAbilities(char.baseAbilities, char.race, char.subrace, char.racialChoice);
      const method = char.abilityMethod;
      let body = '';
      if (method === 'point-buy') {
        const used = ABILITIES.reduce((s,a)=> s + (POINT_BUY_COST[char.baseAbilities[a]] ?? 0), 0);
        body = `<div class="pool">Points remaining: <b>${POINT_BUY_BUDGET - used}</b> / ${POINT_BUY_BUDGET}</div>` +
          ABILITIES.map(a => abilityRow(a, finals[a], true)).join('');
      } else if (method === 'standard-array') {
        body = `<div class="pool">Assign ${STANDARD_ARRAY.join(', ')} — each once</div>` +
          ABILITIES.map(a => {
            const used = ABILITIES.filter(x=>x!==a).map(x=>char.baseAbilities[x]);
            const opts = STANDARD_ARRAY.map(v => `<option value="${v}" ${char.baseAbilities[a]===v?'selected':''} ${used.includes(v)&&char.baseAbilities[a]!==v?'disabled':''}>${v}</option>`).join('');
            return `<div class="ability-row"><label>${ABILITY_NAMES[a]}</label><span></span>
              <select class="sa" data-a="${a}" style="width:64px;">${opts}</select><span></span>
              <div class="final"><b>${finals[a]}</b> (${fmtMod(abilityMod(finals[a]))})</div></div>`;
          }).join('');
      } else {
        body = ABILITIES.map(a =>
          `<div class="ability-row"><label>${ABILITY_NAMES[a]}</label><span></span>
            <input type="number" class="man" data-a="${a}" min="1" max="30" value="${char.baseAbilities[a]}" style="width:64px; text-align:center;"/><span></span>
            <div class="final"><b>${finals[a]}</b> (${fmtMod(abilityMod(finals[a]))})</div></div>`).join('');
      }
      return `<h2>Abilities</h2>
        <div class="seg">
          <button data-m="point-buy" class="${method==='point-buy'?'on':''}">Point buy</button>
          <button data-m="standard-array" class="${method==='standard-array'?'on':''}">Standard array</button>
          <button data-m="manual" class="${method==='manual'?'on':''}">Manual</button>
        </div>
        ${body}
        <div class="info" style="margin-top:12px;">Final scores include racial bonuses. Base values shown are pre-racial.</div>
        ${stepNav()}`;
    }
    function abilityRow(a, finalVal, buy) {
      const base = char.baseAbilities[a];
      return `<div class="ability-row" data-a="${a}">
        <label>${ABILITY_NAMES[a]}</label>
        <button class="stepper dec" ${base<=8?'disabled':''}>−</button>
        <div class="score">${base}</div>
        <button class="stepper inc" ${base>=15?'disabled':''}>+</button>
        <div class="final"><b>${finalVal}</b> (${fmtMod(abilityMod(finalVal))})</div></div>`;
    }

    function tabSkills() {
      const granted = grantedSkills();
      const classChoice = SRD.classSkillChoice(char.classes[0] && char.classes[0].class);
      const allowed = classChoice ? new Set(classChoice.options) : new Set();
      const chosenInPool = char.skills.filter(s => allowed.has(s)).length;
      const remaining = classChoice ? classChoice.choose - chosenInPool : 0;
      const items = SRD.skills.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(sk => {
        const ab = sk.ability_score.index;
        const isGranted = granted.has(sk.index);
        const inPool = allowed.has(sk.index);
        const checked = isGranted || char.skills.includes(sk.index);
        const disabled = isGranted || (!inPool) || (!checked && remaining<=0);
        return `<div class="skill-item ${isGranted?'locked':''}">
          <input type="checkbox" class="sk" value="${sk.index}" ${checked?'checked':''} ${disabled?'disabled':''}/>
          <span>${sk.name}</span>
          ${isGranted?'<span class="pill">granted</span>':(inPool?'':'<span class="pill">n/a</span>')}
          <span class="sk-ability">${ab}</span></div>`;
      }).join('');
      return `<h2>Skills</h2>
        <div class="pool">${classChoice ? `Choose <b>${remaining}</b> more from your class list` : 'This class grants no skill choices.'}</div>
        <div>${items}</div>
        <div class="info" style="margin-top:12px;">“granted” skills come from your race/background. “n/a” aren’t on your class list.</div>
        ${stepNav()}`;
    }

    function tabAppearance() {
      const ap = char.appearance, c = ap.colors;
      const slider = (key,label,min,max) => `<div class="slider-row"><span>${label}</span>
        <input type="range" class="ap-s" data-k="${key}" min="${min}" max="${max}" step="0.05" value="${ap[key]}"/>
        <span>${Number(ap[key]).toFixed(2)}</span></div>`;
      const color = (key,label) => `<label>${label}<input type="color" class="ap-c" data-k="${key}" value="${c[key]}"/></label>`;
      return `<h2>Appearance</h2>
        <button class="btn btn-sm" id="apply-preset" style="margin-bottom:14px;">Apply ${SRD.get('races',char.race)?.name||''} preset</button>
        ${slider('height','Height',0.6,1.4)}
        ${slider('build','Build',0.7,1.4)}
        ${slider('headSize','Head',0.7,1.4)}
        ${slider('armLength','Arms',0.7,1.4)}
        ${slider('legLength','Legs',0.7,1.4)}
        <div class="color-row" style="margin-top:12px;">
          ${color('skin','Skin')} ${color('hair','Hair')} ${color('torso','Shirt')} ${color('legs','Legs')} ${color('eyes','Eyes')}
        </div>
        ${stepNav()}`;
    }

    function tabEquipment() {
      const eq = char.equipment;
      const d = derive();
      const armorOpts = '<option value="">— no armor —</option>' +
        ['Light','Medium','Heavy'].map(cat => {
          const items = SRD.armorList().filter(a=>a.armor_category===cat);
          return `<optgroup label="${cat}">` + items.map(a=>`<option value="${a.index}" ${eq.armor===a.index?'selected':''}>${a.name} (AC ${a.armor_class.base}${a.armor_class.dex_bonus?'+Dex':''})</option>`).join('') + `</optgroup>`;
        }).join('');
      const weaponOpts = SRD.weaponList().map(w=>`<option value="${w.index}">${w.name} — ${w.damage?w.damage.damage_dice:''} ${w.damage&&w.damage.damage_type?w.damage.damage_type.name:''}${w.weapon_range==='Ranged'?' (ranged)':''}</option>`).join('');
      const gearOpts = SRD.gearList().map(g=>`<option value="${g.index}">${g.name}</option>`).join('');
      const wRows = eq.weapons.map((wi,i)=>{ const w=SRD.get('equipment',wi); const a=w?SRD.weaponAttack(w,d.mods,char.classes,d.prof):{attack:0,damage:'',damageType:'',ranged:false,range:'',versatile:null}; return `<div class="inv-row"><span>${w?w.name:wi} <span class="pill">${a.ranged?'ranged '+a.range:'melee'}</span></span><span class="pill">${fmtMod(a.attack)} · ${a.damage}${a.versatile?' ('+a.versatile+' 2H)':''} ${a.damageType}</span><button class="btn-danger btn-sm rm-w" data-i="${i}">✕</button></div>`; }).join('') || '<p style="color:var(--muted); font-size:13px;">No weapons.</p>';
      const iRows = eq.items.map((gi,i)=>{ const g=SRD.get('equipment',gi); return `<div class="inv-row"><span>${g?g.name:gi}</span><button class="btn-danger btn-sm rm-i" data-i="${i}">✕</button></div>`; }).join('') || '<p style="color:var(--muted); font-size:13px;">No gear.</p>';
      return `<h2>Equipment <span style="float:right; font-size:13px; color:var(--muted); font-weight:400;">AC ${d.ac} · ${d.acSource}</span></h2>
        <div class="grid2">
          <div class="row"><label class="fld">Armor</label><select id="eq-armor">${armorOpts}</select></div>
          <div class="row"><label class="fld">Shield</label><label style="display:flex; align-items:center; gap:8px; padding:9px 0;"><input type="checkbox" id="eq-shield" ${eq.shield?'checked':''}/> Equipped (+2 AC)</label></div>
        </div>
        <h3 style="font-size:14px; margin:10px 0 6px;">Weapons</h3>
        <div style="display:flex; gap:8px; margin-bottom:8px;"><select id="eq-weapon" style="flex:1;">${weaponOpts}</select><button class="btn btn-sm" id="add-weapon">Add</button></div>
        <div id="weapon-list">${wRows}</div>
        <h3 style="font-size:14px; margin:14px 0 6px;">Gear</h3>
        <div style="display:flex; gap:8px; margin-bottom:8px;"><select id="eq-gear" style="flex:1;">${gearOpts}</select><button class="btn btn-sm" id="add-gear">Add</button></div>
        <div id="gear-list">${iRows}</div>
        ${stepNav()}`;
    }

    function spellGuideHTML(classIdx, level, mods, casters) {
      const ci = casters.find(x=>x.class===classIdx) || {};
      const levelOf = {}; SRD.spellsForClass(classIdx).forEach(s => levelOf[s.index] = s.level);
      const chosen = char.spells.filter(x => levelOf[x] != null);
      const cc = chosen.filter(x => levelOf[x] === 0).length;
      const cs = chosen.filter(x => levelOf[x] > 0).length;
      const lim = SRD.spellLimits(classIdx, level, ci.ability ? (mods[ci.ability]||0) : 0);
      const cap = (n, max) => `<b class="${(max!=null && n>max)?'red':''}">${n}</b>/${max!=null?max:'—'}`;
      return `Cantrips ${cap(cc, lim.cantrips)} · ${lim.prepared?'Prepared':'Spells'} ${cap(cs, lim.known)}`;
    }
    function updateSpellGuides() {
      const d = derive();
      document.querySelectorAll('.caster-block').forEach(block => {
        const cls = block.dataset.class, lvl = +block.dataset.level, g = block.querySelector('.spell-guide');
        if (g && cls) g.innerHTML = spellGuideHTML(cls, lvl, d.mods, d.spellInfo.casters);
      });
    }

    function tabSpells() {
      const d = derive();
      const casters = char.classes.filter(c=>SRD.isCaster(c.class));
      if (!casters.length) return `<h2>Spells</h2><p style="color:var(--muted)">No spellcasting classes.</p>${stepNav()}`;
      const si = d.spellInfo;
      const slotLine = Object.entries(si.slots).filter(([l,n])=>n>0).map(([l,n])=>`L${l}×${n}`).join('  ·  ');
      const pactLine = si.pact ? `Pact magic: ${si.pact.count} × L${si.pact.level}` : '';
      const maxLvl = Math.max(0, ...Object.entries(si.slots).filter(([l,n])=>n>0).map(([l])=>+l), si.pact?si.pact.level:0);
      const blocks = casters.map(c => {
        const cl = SRD.get('classes', c.class);
        const ci = si.casters.find(x=>x.class===c.class) || {};
        const spellsOfClass = SRD.spellsForClass(c.class);
        const guide = `<div class="info spell-guide" style="margin:4px 0 8px; padding:8px 10px;">${spellGuideHTML(c.class, c.level, d.mods, si.casters)}</div>`;
        const byLevel = {};
        spellsOfClass.forEach(s => { if (s.level<=maxLvl) (byLevel[s.level]=byLevel[s.level]||[]).push(s); });
        const sections = Object.keys(byLevel).map(Number).sort((a,b)=>a-b).map(lv => {
          const label = lv===0?'Cantrips':`Level ${lv}`;
          const items = byLevel[lv].map(s=>`<label class="spell ${char.spells.includes(s.index)?'on':''}"><input type="checkbox" class="sp" value="${s.index}" ${char.spells.includes(s.index)?'checked':''}/> ${s.name}${s.concentration?' <span class="pill">C</span>':''}${s.ritual?' <span class="pill">R</span>':''}</label>`).join('');
          return `<details ${lv<=1?'open':''}><summary>${label} <span style="color:var(--muted)">(${byLevel[lv].length})</span></summary><div class="spell-grid">${items}</div></details>`;
        }).join('') || '<p style="color:var(--muted); font-size:13px;">No spells available at this level yet.</p>';
        return `<div class="caster-block" data-class="${c.class}" data-level="${c.level}"><h3 style="font-size:15px; margin:6px 0;">${esc(cl.name)} <span style="color:var(--muted); font-weight:400; font-size:13px;">${ci.ability?ci.ability.toUpperCase():''} · save DC ${ci.dc!=null?ci.dc:'?'} · spell atk ${ci.atk!=null?fmtMod(ci.atk):'?'}</span></h3>${guide}${sections}</div>`;
      }).join('');
      return `<h2>Spells</h2>
        <div class="info" style="margin-bottom:12px;">Spell slots — ${slotLine||'—'}${pactLine?('  ·  '+pactLine):''}</div>
        ${blocks}
        ${stepNav()}`;
    }

    function tabReview() {
      const d = derive();
      const classes = char.classes.map(c => { const cl=SRD.get('classes',c.class); const sub=c.subclass&&SRD.get('subclasses',c.subclass); return `${esc(cl?cl.name:c.class)} ${c.level}${sub?` (${esc(sub.name)})`:''}`; }).join(' / ');
      const race = SRD.get('races', char.race); const sub = char.subrace && SRD.get('subraces', char.subrace);
      const abilGrid = ABILITIES.map(a=>`<div class="metric"><div class="l">${a.toUpperCase()}</div><div class="v">${d.finals[a]}</div><div class="l">${fmtMod(d.mods[a])}${d.saves.has(a)?' · save '+fmtMod(d.mods[a]+d.prof):''}</div></div>`).join('');
      const skillList = [...d.proficient].map(s=>SRD.get('skills',s)).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name)).map(sk=>{ const ab=sk.ability_score.index; return `<div class="inv-row"><span>${sk.name} <span class="pill">${ab}</span></span><b>${fmtMod(d.mods[ab]+d.prof)}</b></div>`; }).join('') || '<span style="color:var(--muted)">—</span>';
      const attacks = char.equipment.weapons.map(wi=>{ const w=SRD.get('equipment',wi); if(!w) return ''; const a=SRD.weaponAttack(w,d.mods,char.classes,d.prof); return `<div class="inv-row"><span>${w.name} <span class="pill">${a.ranged?'ranged '+a.range:'melee'}</span></span><b>${fmtMod(a.attack)} · ${a.damage}${a.versatile?' ('+a.versatile+' 2H)':''} ${a.damageType}</b></div>`; }).join('') || '<span style="color:var(--muted)">No weapons.</span>';
      const si=d.spellInfo;
      const slotsTxt = Object.entries(si.slots).filter(([l,n])=>n>0).map(([l,n])=>`L${l}×${n}`).join('  ') + (si.pact?`  Pact ${si.pact.count}×L${si.pact.level}`:'');
      const spellNames = char.spells.map(x=>SRD.get('spells',x)).filter(Boolean).sort((a,b)=>a.level-b.level||a.name.localeCompare(b.name));
      const spellsTxt = spellNames.length ? spellNames.map(s=>`${s.level===0?'•':s.level} ${s.name}`).join(', ') : '—';
      const gear = char.equipment.items.map(gi=>SRD.get('equipment',gi)).filter(Boolean).map(g=>g.name).join(', ') || '—';
      const armorTxt = char.equipment.armor ? SRD.get('equipment',char.equipment.armor).name : 'none';
      const feats = SRD.classFeatures(char.classes);
      const featTxt = feats.length ? feats.map(f=>`${esc(f.name)} (L${f.level})`).join(', ') : '—';
      return `<h2>${esc(char.name)||'(unnamed)'} <span style="float:right; font-size:13px; color:var(--muted); font-weight:400;">${esc(sub?sub.name:(race?race.name:''))} · ${classes}</span></h2>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div>
            <div class="metrics" style="grid-template-columns:repeat(3,1fr);">${abilGrid}</div>
            <h3 style="font-size:14px; margin:12px 0 6px;">Skills</h3>${skillList}
          </div>
          <div>
            <div class="info" style="line-height:1.7;">AC <strong>${d.ac}</strong> <span style="color:var(--muted)">(${d.acSource})</span><br/>HP <strong>${d.hp}</strong> · Init <strong>${fmtMod(d.init)}</strong> · Speed <strong>${d.speed}</strong> · Prof <strong>${fmtMod(d.prof)}</strong> · PP <strong>${d.pp}</strong><br/>${char.background?SRD.get('backgrounds',char.background).name:'—'}${char.alignment?(' · '+SRD.get('alignments',char.alignment).name):''}</div>
            <h3 style="font-size:14px; margin:12px 0 6px;">Attacks</h3>${attacks}
            ${si.casters.length?`<h3 style="font-size:14px; margin:12px 0 6px;">Spells</h3><div class="info">${si.casters.map(ci=>`${SRD.get('classes',ci.class).name}: save DC ${ci.dc!=null?ci.dc:'?'} · spell atk ${ci.atk!=null?fmtMod(ci.atk):'?'}`).join('<br/>')}<div style="margin-top:6px;">Slots: ${slotsTxt||'—'}</div><div style="margin-top:6px;">${spellsTxt}</div></div>`:''}
          </div>
        </div>
        <h3 style="font-size:14px; margin:14px 0 6px;">Equipment</h3><div class="info">Armor: ${armorTxt}${char.equipment.shield?' · shield':''}<div style="margin-top:4px;">Gear: ${gear}</div></div>
        <h3 style="font-size:14px; margin:14px 0 6px;">Features</h3><div class="info">${featTxt}</div>
        <p style="color:var(--muted); font-size:13px; margin-top:12px;">Use “Save character” on the right.</p>
        ${stepNav()}`;
    }

    function stepNav() {
      const T = TABS(); const i = T.findIndex(t=>t[0]===activeTab);
      return `<div class="stepnav">
        <button class="btn btn-sm nav-prev" ${i<=0?'disabled':''}>← Back</button>
        <button class="btn btn-sm btn-accent nav-next" ${i>=T.length-1?'disabled':''}>Next →</button></div>`;
    }

    /* ---------- Wiring ---------- */
    function pruneSpells() {
      const valid = new Set(char.classes.flatMap(c => SRD.spellsForClass(c.class).map(s => s.index)));
      char.spells = char.spells.filter(x => valid.has(x));
    }
    // Reset references to homebrew that was deleted, so the dropdowns and char state agree.
    function reconcileChar() {
      let changed = false;
      if (SRD && !SRD.get('races', char.race)) { char.race = 'human'; char.subrace = null; char.racialChoice = []; changed = true; }
      char.classes.forEach(c => { if (SRD && !SRD.get('classes', c.class)) { c.class = 'fighter'; c.subclass = null; changed = true; } });
      return changed;
    }
    function refresh() { pruneSpells(); renderTab(); renderTabs(); renderRail(); updateModel(); }

    function wireTab() {
      const b = $('tab-body');
      b.querySelectorAll('.nav-prev').forEach(e=>e.onclick=()=>{ const T=TABS(); const i=T.findIndex(t=>t[0]===activeTab); if(i>0){activeTab=T[i-1][0]; renderTabs(); renderTab();} });
      b.querySelectorAll('.nav-next').forEach(e=>e.onclick=()=>{ const T=TABS(); const i=T.findIndex(t=>t[0]===activeTab); if(i<T.length-1){activeTab=T[i+1][0]; renderTabs(); renderTab();} });

      if (activeTab === 'identity') {
        $('f-name').oninput = e => { char.name = e.target.value; };
        $('f-race').onchange = e => { char.race = e.target.value; char.subrace=null; char.racialChoice=[]; applyPreset(char.race); refresh(); };
        $('f-subrace').onchange = e => { char.subrace = e.target.value || null; refresh(); };
        $('f-bg').onchange = e => { char.background = e.target.value; refresh(); };
        $('f-align').onchange = e => { char.alignment = e.target.value || null; };
        b.querySelectorAll('.rc').forEach(cb => cb.onchange = () => {
          const rb = SRD.racialAbilityBonuses(char.race, char.subrace);
          const picked = [...b.querySelectorAll('.rc:checked')].map(x=>x.value);
          if (picked.length <= (rb.options?rb.options.choose:0)) char.racialChoice = picked;
          refresh();
        });
      } else if (activeTab === 'class') {
        b.querySelectorAll('.class-row').forEach(row => {
          const i = +row.dataset.i;
          row.querySelector('.c-class').onchange = e => { char.classes[i].class=e.target.value; char.classes[i].subclass=null; refresh(); };
          row.querySelector('.c-level').onchange = e => { char.classes[i].level=Math.max(1,Math.min(20,+e.target.value||1)); refresh(); };
          row.querySelector('.c-sub').onchange = e => { char.classes[i].subclass=e.target.value||null; refresh(); };
          row.querySelector('.c-del').onclick = () => { if(char.classes.length>1){char.classes.splice(i,1); refresh();} };
        });
        $('add-class').onclick = () => { if(char.classes.length<3){char.classes.push({class:'wizard',subclass:null,level:1}); refresh();} };
      } else if (activeTab === 'abilities') {
        b.querySelectorAll('.seg button').forEach(btn => btn.onclick = () => {
          char.abilityMethod = btn.dataset.m;
          if (char.abilityMethod==='standard-array') assignStandardArray();
          refresh();
        });
        b.querySelectorAll('.ability-row[data-a]').forEach(row => {
          const a = row.dataset.a;
          const inc = row.querySelector('.inc'), dec = row.querySelector('.dec');
          if (inc) inc.onclick = () => { if(canBuy(a,1)){ char.baseAbilities[a]++; refresh(); } };
          if (dec) dec.onclick = () => { if(char.baseAbilities[a]>8){ char.baseAbilities[a]--; refresh(); } };
        });
        b.querySelectorAll('.sa').forEach(s => s.onchange = e => { char.baseAbilities[e.target.dataset.a]=+e.target.value; refresh(); });
        b.querySelectorAll('.man').forEach(s => s.onchange = e => { char.baseAbilities[e.target.dataset.a]=Math.max(1,Math.min(30,+e.target.value||1)); refresh(); });
      } else if (activeTab === 'skills') {
        b.querySelectorAll('.sk').forEach(cb => cb.onchange = () => {
          char.skills = [...b.querySelectorAll('.sk:checked')].map(x=>x.value).filter(v => !grantedSkills().has(v));
          refresh();
        });
      } else if (activeTab === 'appearance') {
        $('apply-preset').onclick = () => { applyPreset(char.race, true); refresh(); };
        b.querySelectorAll('.ap-s').forEach(s => s.oninput = e => { char.appearance[e.target.dataset.k]=+e.target.value; e.target.nextElementSibling.textContent=(+e.target.value).toFixed(2); updateModel(); });
        b.querySelectorAll('.ap-c').forEach(c => c.oninput = e => { char.appearance.colors[e.target.dataset.k]=e.target.value; updateModel(); });
      } else if (activeTab === 'equipment') {
        $('eq-armor').onchange = e => { char.equipment.armor = e.target.value || null; refresh(); };
        $('eq-shield').onchange = e => { char.equipment.shield = e.target.checked; refresh(); };
        $('add-weapon').onclick = () => { const v=$('eq-weapon').value; if(v){ char.equipment.weapons.push(v); refresh(); } };
        $('add-gear').onclick = () => { const v=$('eq-gear').value; if(v){ char.equipment.items.push(v); refresh(); } };
        b.querySelectorAll('.rm-w').forEach(btn=>btn.onclick=()=>{ char.equipment.weapons.splice(+btn.dataset.i,1); refresh(); });
        b.querySelectorAll('.rm-i').forEach(btn=>btn.onclick=()=>{ char.equipment.items.splice(+btn.dataset.i,1); refresh(); });
      } else if (activeTab === 'spells') {
        b.querySelectorAll('.sp').forEach(cb=>cb.onchange=()=>{ const v=cb.value; if(cb.checked){ if(!char.spells.includes(v)) char.spells.push(v); } else { char.spells=char.spells.filter(x=>x!==v); } b.querySelectorAll('.sp[value="'+CSS.escape(v)+'"]').forEach(x=>{ x.checked=cb.checked; x.closest('.spell').classList.toggle('on', cb.checked); }); updateSpellGuides(); renderRail(); });
      }
    }

    function canBuy(a, delta) {
      const next = char.baseAbilities[a] + delta;
      if (next < 8 || next > 15) return false;
      const used = ABILITIES.reduce((s,x)=> s + (POINT_BUY_COST[char.baseAbilities[x]] ?? 0), 0);
      const cost = (POINT_BUY_COST[next] ?? 99) - (POINT_BUY_COST[char.baseAbilities[a]] ?? 0);
      return used + cost <= POINT_BUY_BUDGET;
    }
    function assignStandardArray() {
      ABILITIES.forEach((a,i)=> char.baseAbilities[a] = STANDARD_ARRAY[i] ?? 8);
    }
    function applyPreset(raceIdx, includeColors=true) {
      const p = RACE_PRESETS[raceIdx]; if (!p) return;
      for (const k of ['height','build','headSize','armLength','legLength']) if (p[k]!=null) char.appearance[k]=p[k];
      if (includeColors && p.colors) Object.assign(char.appearance.colors, p.colors);
    }

    function renderRail() {
      const d = derive();
      $('metrics').innerHTML = [
        ['HP',d.hp],['AC',d.ac],['Speed',d.speed],['Init',fmtMod(d.init)],['Prof',fmtMod(d.prof)],['PP',d.pp]
      ].map(([l,v])=>`<div class="metric"><div class="l">${l}</div><div class="v">${v}</div></div>`).join('');
      $('mods').innerHTML = ABILITIES.map(a=>`<div class="m">${a.toUpperCase()}<b>${fmtMod(d.mods[a])}</b></div>`).join('');
    }

    /* ---------- 3D preview ---------- */
    let scene, camera, renderer, controls, model, mats;
    function initPreview() {
      const canvas = $('preview-canvas');
      const w = canvas.clientWidth || 300, h = 300;
      scene = new THREE.Scene(); scene.background = new THREE.Color(0x2b2b2b);
      camera = new THREE.PerspectiveCamera(75, w/h, 0.1, 1000); camera.position.set(0,1,2.6); camera.lookAt(0,0.5,0);
      renderer = new THREE.WebGLRenderer({ canvas, antialias:true }); renderer.setSize(w,h); renderer.setPixelRatio(window.devicePixelRatio);
      controls = new OrbitControls(camera, renderer.domElement); controls.target.set(0,0.5,0); controls.enableDamping=true; controls.enablePan=false; controls.minDistance=1.6; controls.maxDistance=5;
      scene.add(new THREE.AmbientLight(0xffffff,0.8));
      const dl = new THREE.DirectionalLight(0xffffff,1); dl.position.set(2,5,3); scene.add(dl);
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(10,10), new THREE.MeshStandardMaterial({color:0x333333}));
      ground.rotation.x=-Math.PI/2; ground.position.y=-0.5; scene.add(ground);
      buildModel();
      (function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene,camera); })();
      window.addEventListener('resize', () => { const ww=canvas.clientWidth||300; renderer.setSize(ww,300); camera.aspect=ww/300; camera.updateProjectionMatrix(); });
    }
    function buildModel() {
      if (model) scene.remove(model);
      model = new THREE.Group();
      mats = {
        skin:new THREE.MeshLambertMaterial(), torso:new THREE.MeshLambertMaterial(),
        legs:new THREE.MeshLambertMaterial(), hair:new THREE.MeshLambertMaterial(),
        eye:new THREE.MeshBasicMaterial({color:0x111111})
      };
      const mk = (geo,mat,name)=>{ const m=new THREE.Mesh(geo,mat); m.name=name; model.add(m); return m; };
      mk(new THREE.CylinderGeometry(0.3,0.3,1,24), mats.torso, 'torso');
      mk(new THREE.SphereGeometry(0.4,24,24), mats.skin, 'head');
      mk(new THREE.SphereGeometry(0.41,20,16,0,Math.PI*2,0,Math.PI*0.55), mats.hair, 'hair');
      mk(new THREE.SphereGeometry(0.05,12,12), mats.eye, 'eyeL');
      mk(new THREE.SphereGeometry(0.05,12,12), mats.eye, 'eyeR');
      mk(new THREE.CylinderGeometry(0.08,0.08,0.8,12), mats.skin, 'armL');
      mk(new THREE.CylinderGeometry(0.08,0.08,0.8,12), mats.skin, 'armR');
      mk(new THREE.CylinderGeometry(0.1,0.1,0.9,12), mats.legs, 'legL');
      mk(new THREE.CylinderGeometry(0.1,0.1,0.9,12), mats.legs, 'legR');
      scene.add(model); model.position.y = 0.5;
      updateModel();
    }
    function updateModel() {
      if (!model) return;
      const ap = char.appearance, c = ap.colors;
      mats.skin.color.set(c.skin); mats.torso.color.set(c.torso); mats.legs.color.set(c.legs);
      mats.hair.color.set(c.hair); mats.eye.color.set(c.eyes);
      const g = n => model.getObjectByName(n);
      const H=ap.height, B=ap.build, HS=ap.headSize, AL=ap.armLength, LL=ap.legLength;
      const torso=g('torso'); torso.scale.set(B,H,B); torso.position.y = H/2 - 0.5;
      const head=g('head'); head.scale.set(HS,HS,HS); const hr=0.4*HS; head.position.y = H + hr - 0.5;
      const hair=g('hair'); hair.scale.set(HS,HS,HS); hair.position.y = head.position.y;
      const eL=g('eyeL'), eR=g('eyeR'); const ey=head.position.y+0.08*HS, ez=hr-0.04;
      eL.position.set(-0.13*HS,ey,ez); eR.position.set(0.13*HS,ey,ez);
      const aL=g('armL'), aR=g('armR'); aL.scale.set(B,AL,B); aR.scale.set(B,AL,B);
      const ay = torso.position.y + (H/2) - (0.8*AL/2);
      aL.position.set(-0.4*B,ay,0); aR.position.set(0.4*B,ay,0);
      const lL=g('legL'), lR=g('legR'); lL.scale.set(B,LL,B); lR.scale.set(B,LL,B);
      const ly = torso.position.y - (H/2) - (0.9*LL/2) + 0.45;
      lL.position.set(-0.15*B,ly,0); lR.position.set(0.15*B,ly,0);
    }

    /* ---------- Save / load ---------- */
    function buildSaveObject() {
      const ap = char.appearance;
      return {
        id: char.id || undefined,
        name: char.name || 'Unnamed',
        schemaVersion: 2,
        race: char.race, subrace: char.subrace, background: char.background, alignment: char.alignment,
        classes: char.classes.map(c => ({ ...c })),
        abilityMethod: char.abilityMethod,
        abilities: { ...char.baseAbilities }, racialChoice: [...char.racialChoice],
        skills: [...char.skills],
        appearance: { height:ap.height, build:ap.build, headSize:ap.headSize, armLength:ap.armLength, legLength:ap.legLength, colors:{...ap.colors} },
        equipment: { armor: char.equipment.armor, shield: !!char.equipment.shield, weapons: [...char.equipment.weapons], items: [...char.equipment.items] },
        spells: [...char.spells],
        // back-compat for existing token renderers
        color: ap.colors.torso,
        stats: { ...char.baseAbilities },
        owner: username
      };
    }
    function loadIntoBuilder(c) {
      char = defaultChar();
      char.id = c.id || null; char.name = c.name || '';
      char.race = c.race || 'human'; char.subrace = c.subrace || null;
      char.background = c.background || 'acolyte'; char.alignment = c.alignment || null;
      char.classes = Array.isArray(c.classes) && c.classes.length ? c.classes.map(x => ({ class: x.class || x.name?.toLowerCase?.() || 'fighter', subclass: x.subclass||null, level: x.level||1 })) : [{class:'fighter',subclass:null,level:1}];
      char.abilityMethod = c.abilityMethod || 'manual';
      char.baseAbilities = { ...char.baseAbilities, ...(c.abilities || c.stats || {}) };
      char.racialChoice = c.racialChoice || [];
      char.skills = c.skills || [];
      char.equipment = c.equipment ? { armor: c.equipment.armor ?? null, shield: !!c.equipment.shield, weapons: c.equipment.weapons || [], items: c.equipment.items || [] } : { armor:null, shield:false, weapons:[], items:[] };
      char.spells = c.spells || [];
      if (c.appearance) char.appearance = {
        height: c.appearance.height ?? 1, build: c.appearance.build ?? 1, headSize: c.appearance.headSize ?? 1,
        armLength: c.appearance.armLength ?? 1, legLength: c.appearance.legLength ?? 1,
        colors: { ...DEFAULT_COLORS, ...(c.appearance.colors || (c.color?{torso:c.color}:{})) }
      };
      const reconciled = reconcileChar();
      activeTab = 'identity'; renderTabs(); buildModel(); refresh();
      msg('Loaded ' + (c.name||'character') + (reconciled ? ' (deleted homebrew reset to defaults)' : ''));
    }
    function renderSaved(list) {
      const el = $('saved');
      if (!list || !list.length) { el.innerHTML = '<p style="color:var(--muted); font-size:13px;">None yet.</p>'; return; }
      el.innerHTML = list.map(c => {
        const lvl = (c.classes||[]).reduce((s,x)=>s+(x.level||0),0);
        const owner = c.owner && c.owner!==username ? ` <span class="pill">${esc(c.owner)}</span>` : '';
        return `<div class="c" data-id="${esc(c.id)}"><span><b style="color:${esc(c.color||'#dd4444')}">${esc(c.name)}</b>${owner} <span style="color:var(--muted)">· L${lvl}</span></span><button class="del" data-id="${esc(c.id)}">✕</button></div>`;
      }).join('');
      window._chars = list;
      el.querySelectorAll('.c').forEach(row => row.onclick = e => {
        if (e.target.classList.contains('del')) return;
        const c = list.find(x=>x.id===row.dataset.id); if (c) loadIntoBuilder(c);
      });
      el.querySelectorAll('.del').forEach(btn => btn.onclick = e => {
        e.stopPropagation();
        if (confirm('Delete this character?')) socket.emit('delete-character', btn.dataset.id);
      });
    }
    function msg(t, err=false) { const m=$('msg'); m.textContent=t; m.style.color = err?'#f87171':'#34d399'; setTimeout(()=>{ if(m.textContent===t) m.textContent=''; }, 3000); }

    /* ---------- Boot ---------- */
    async function startApp() {
      try { SRD = await loadSRD(); }
      catch (e) { $('boot').textContent = 'Failed to load SRD data: ' + e.message; return; }
      $('boot').classList.add('hidden'); $('app').classList.remove('hidden');
      $('who').textContent = 'Logged in as ' + username;
      if (pendingHomebrew) SRD.setHomebrew(pendingHomebrew);
      reconcileChar();
      applyPreset(char.race);
      renderTabs(); renderTab(); renderRail(); initPreview();
      $('save-btn').onclick = () => {
        if (!socket || !username) return msg('Not connected', true);
        if (!char.name.trim()) { activeTab='identity'; renderTabs(); renderTab(); return msg('Enter a name', true); }
        socket.emit('save-character', { charData: buildSaveObject(), username });
      };
      $('new-btn').onclick = () => { char = defaultChar(); applyPreset(char.race); activeTab='identity'; renderTabs(); buildModel(); refresh(); msg('New character'); };
    }

    /* ---------- Login + socket ---------- */
    const loginOverlay = $('login-overlay'), userInput = $('username-input'), loginBtn = $('login-btn'), loginError = $('login-error');
    function showLoginError(t){ loginError.textContent=t; loginError.classList.remove('hidden'); setTimeout(()=>loginError.classList.add('hidden'),3000); }
    function doLogin() {
      const u = userInput.value.trim();
      if (!u || u.length<2) return showLoginError('Username must be at least 2 characters');
      loginBtn.disabled=true; loginBtn.textContent='Connecting…';
      socket = io();
      socket.on('connect', () => socket.emit('login', u));
      socket.on('login-success', (data) => {
        username = data.username; sessionStorage.setItem('vtt_username', username);
        loginOverlay.classList.add('hidden'); startApp();
      });
      socket.on('load-user-characters', renderSaved);
      socket.on('load-homebrew', (hb) => {
        pendingHomebrew = hb;
        if (SRD) {
          SRD.setHomebrew(hb); reconcileChar(); pruneSpells();
          // Don't blow away the panel if the user is mid-edit inside it.
          const editing = document.activeElement && $('tab-body').contains(document.activeElement);
          if (!$('app').classList.contains('hidden') && !editing) { renderTabs(); renderTab(); renderRail(); }
        }
      });
      socket.on('character-saved-success', (c) => { char.id = c.id; msg('Saved “'+c.name+'”'); });
      socket.on('character-deleted', () => socket.emit('get-characters'));
      socket.on('error', (m) => { if (!username) { showLoginError(m); loginBtn.disabled=false; loginBtn.textContent='Login'; } else { msg(m, true); } });
    }
    loginBtn.onclick = doLogin;
    userInput.onkeypress = e => { if (e.key==='Enter') doLogin(); };
    const stored = sessionStorage.getItem('vtt_username');
    if (stored) { userInput.value = stored; doLogin(); }
  </script>
</body>
