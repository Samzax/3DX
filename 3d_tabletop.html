    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        // --- Firebase/LocalStorage Imports REMOVED ---

        let scene, camera, renderer, controls;
        let plane, grid;
        let raycaster, mouse;
        let objects = []; 
        let selectedObject = null; 
        let selectedObjectType = null;
        let menuButtons = {};
        
        // --- NEW: Socket.io State ---
        let socket;
        // --- END NEW ---
        
        // --- Local Storage Key (Apenas para Personagens) ---
        let selectedObjectData = null; 
        const CHARACTER_STORAGE_KEY = 'vtt_characters'; 
        // --- END ---

        let currentTool = null; 
        let currentMoveMode = 'standard'; 
        let toolMenuButtons = {};
        let moveSubMenuButtons = {};
        let moveSubMenu;
        let movePressTimer = null;
        let isLongPress = false;
        let isDraggingHeight = false; 

        let currentRulerMode = 'straight'; 
        let currentRulerColor = 0x00ffff; 
        let rulerSubMenu, rulerSubMenuButtons = {};
        let rulerPressTimer = null;
        let isRulerLongPress = false;
        let rulerPoints = []; 
        let currentRulerLine = null; 
        let rulerSegments = []; 
        let lastRulerClickTime = 0; 
        
        let currentRulerSnapMode = 'center'; 
        let rulerSnapSubMenuButtons = {};

        let rulerTooltip;
        let lastMouseX = 0;
        let lastMouseY = 0;

        const gridSize = 1000; 
        const gridDivisions = 1000; 
        const gridCellSize = gridSize / gridDivisions; 
        const FEET_PER_GRID_CELL = 5; 

        const defaultMaterial = new THREE.MeshLambertMaterial({ color: 0xdd4444 }); 
        const selectedMaterial = new THREE.MeshLambertMaterial({ color: 0xffff44, emissive: 0xaaaa00 }); 
        const rulerLineMaterial = new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2, transparent: true, opacity: 0.8 });
        const rulerPreviewMaterial = new THREE.LineDashedMaterial({ 
            color: 0x00ffff, 
            linewidth: 1, 
            transparent: true, 
            opacity: 0.7, 
            dashSize: 0.2, 
            gapSize: 0.1 
        });
        const characterBaseMaterial = new THREE.MeshLambertMaterial({ color: 0xdd4444 });
        const characterEyeMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });

        // ===== Three-layer map (World -> Region -> Tactical) =====
        // A map is identified by a path key:
        //   "world"            depth 0  -> hex grid, 90 km per hex
        //   "world/q,r"        depth 1  -> hex grid, 9 km per hex
        //   "world/q,r/q,r"    depth 2  -> square grid, 5 ft per cell (tactical)
        let currentMapKey = 'world';
        let hexGridGroup = null;

        const SQRT3 = Math.sqrt(3);
        const HEX_SIZE = 2;            // world units (circumradius) used to draw hexes
        const HEX_MAP_RADIUS = 6;      // hex field radius, in hexes
        const KM_PER_HEX = { 0: 90, 1: 9 }; // depth -> km label per hex

        const hexLineMaterial = new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.5 });

        function mapDepth(key) { return key.split('/').length - 1; }      // 0 world, 1 region, 2 tactical
        function isHexLayer(depth = mapDepth(currentMapKey)) { return depth < 2; }

        // --- Pointy-top axial hex math on the XZ ground plane ---
        function hexToWorld(q, r) {
            return { x: HEX_SIZE * SQRT3 * (q + r / 2), z: HEX_SIZE * 1.5 * r };
        }
        function roundHex(qf, rf) { // cube rounding
            let xf = qf, zf = rf, yf = -qf - rf;
            let rx = Math.round(xf), ry = Math.round(yf), rz = Math.round(zf);
            const dx = Math.abs(rx - xf), dy = Math.abs(ry - yf), dz = Math.abs(rz - zf);
            if (dx > dy && dx > dz) rx = -ry - rz;
            else if (dy > dz) ry = -rx - rz;
            else rz = -rx - ry;
            return { q: rx, r: rz };
        }
        function worldToHex(x, z) {
            return roundHex((SQRT3 / 3 * x - 1 / 3 * z) / HEX_SIZE, (2 / 3 * z) / HEX_SIZE);
        }
        function hexDistance(a, b) {
            return (Math.abs(a.q - b.q) + Math.abs(a.q + a.r - b.q - b.r) + Math.abs(a.r - b.r)) / 2;
        }
        function hexInField(q, r) {
            return Math.max(Math.abs(q), Math.abs(r), Math.abs(q + r)) <= HEX_MAP_RADIUS;
        }
        function hexCorner(cx, cz, i) {
            const ang = Math.PI / 180 * (60 * i - 30); // pointy-top corners
            return new THREE.Vector3(cx + HEX_SIZE * Math.cos(ang), 0.02, cz + HEX_SIZE * Math.sin(ang));
        }
        function buildHexGrid() {
            const positions = [];
            for (let q = -HEX_MAP_RADIUS; q <= HEX_MAP_RADIUS; q++) {
                for (let r = -HEX_MAP_RADIUS; r <= HEX_MAP_RADIUS; r++) {
                    if (!hexInField(q, r)) continue;
                    const { x, z } = hexToWorld(q, r);
                    const c = [];
                    for (let i = 0; i < 6; i++) c.push(hexCorner(x, z, i));
                    for (let i = 0; i < 6; i++) {
                        const a = c[i], b = c[(i + 1) % 6];
                        positions.push(a.x, a.y, a.z, b.x, b.y, b.z);
                    }
                }
            }
            const geom = new THREE.BufferGeometry();
            geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const group = new THREE.Group();
            group.add(new THREE.LineSegments(geom, hexLineMaterial));
            return group;
        }
        function showLayerGrid(depth) {
            if (grid) grid.visible = (depth === 2);     // square grid only on tactical
            if (hexGridGroup) {
                scene.remove(hexGridGroup);
                hexGridGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); });
                hexGridGroup = null;
            }
            if (depth < 2) {
                hexGridGroup = buildHexGrid();
                scene.add(hexGridGroup);
            }
        }

        // --- Layer-aware snapping & measurement ---
        function snapToCurrentGrid(point) {
            if (isHexLayer()) {
                const h = worldToHex(point.x, point.z);
                const c = hexToWorld(h.q, h.r);
                return new THREE.Vector3(c.x, point.y, c.z);
            }
            return snapToGrid(point);
        }
        function getCurrentRulerSnap(point) {
            if (isHexLayer()) {
                const h = worldToHex(point.x, point.z);
                const c = hexToWorld(h.q, h.r);
                return new THREE.Vector3(c.x, 0.02, c.z);
            }
            return getRulerSnapPosition(point);
        }
        function measurePath(points) {
            // hex layers: sum of hex steps * km per hex
            const km = KM_PER_HEX[mapDepth(currentMapKey)] || 0;
            let steps = 0;
            for (let i = 0; i < points.length - 1; i++) {
                steps += hexDistance(worldToHex(points[i].x, points[i].z), worldToHex(points[i + 1].x, points[i + 1].z));
            }
            return { value: steps * km, unit: 'km' };
        }

        // --- Drill-down navigation ---
        function enterMap(key) {
            currentMapKey = key;
            if (selectedObject) deselectObject();
            clearInProgressRuler();
            // reset tool state locally (no server side effects)
            selectedObjectType = null;
            selectedObjectData = null;
            currentTool = null;
            for (const k in toolMenuButtons) toolMenuButtons[k].classList.remove('active');
            document.querySelectorAll('#object-menu .menu-button').forEach(b => b.classList.remove('active'));
            if (rulerTooltip) rulerTooltip.style.display = 'none';
            // clear local scene; server repopulates via 'map-state' after join-map
            objects.forEach(o => scene.remove(o));
            objects = [];
            rulerSegments.forEach(s => { scene.remove(s); if (s.geometry) s.geometry.dispose(); });
            rulerSegments = [];
            showLayerGrid(mapDepth(key));
            updateBreadcrumb();
            if (socket) socket.emit('join-map', { key });
        }
        function goUp() {
            if (mapDepth(currentMapKey) <= 0) return;
            enterMap(currentMapKey.split('/').slice(0, -1).join('/'));
        }
        function descendInto(q, r) {
            if (mapDepth(currentMapKey) >= 2) return; // tactical is the leaf
            if (!hexInField(q, r)) return;
            enterMap(`${currentMapKey}/${q},${r}`);
        }
        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            const up = document.getElementById('btn-up');
            if (!bc) return;
            const segs = currentMapKey.split('/');
            const labels = ['World'];
            for (let i = 1; i < segs.length; i++) labels.push((i === 1 ? 'Region' : 'Tactical') + ' (' + segs[i] + ')');
            const depth = mapDepth(currentMapKey);
            const scale = depth === 0 ? 'each hex = 90 km' : depth === 1 ? 'each hex = 9 km' : 'each square = 5 ft';
            bc.textContent = labels.join('  ›  ') + '   —   ' + scale;
            if (up) up.disabled = (depth === 0);
        }
        function onDoubleClick(event) {
            if (mapDepth(currentMapKey) >= 2) return;
            if (currentTool === 'add' || currentTool === 'move' || currentTool === 'ruler') return;
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hit = raycaster.intersectObject(plane)[0];
            if (!hit) return;
            const h = worldToHex(hit.point.x, hit.point.z);
            descendInto(h.q, h.r);
        }

        // --- NEW: Socket.io Init Function ---
        function initSocket() {
            // Conecta-se ao servidor que serviu este arquivo
            socket = io(); 
            
            console.log("A tentar conectar ao servidor...");

            socket.on('connect', () => {
                console.log('Conectado ao servidor com ID:', socket.id);
                // Auto-login as GM on this single connection
                socket.emit('login', 'GM');
                sessionStorage.setItem('vtt_username', 'GM');
            });

            // --- GM login + character sync ---
            socket.on('login-success', (userData) => {
                console.log('GM logged in:', userData);
                const loginOverlay = document.getElementById('login-overlay');
                if (loginOverlay) loginOverlay.classList.add('hidden');
            });

            socket.on('load-user-characters', (characters) => {
                console.log('GM received characters:', characters);
                loadCharactersToMenu(characters);
            });

            socket.on('character-updated', (charData) => {
                console.log('Character updated:', charData);
                socket.emit('get-characters'); // Refresh the menu
            });

            // --- Ouvintes de Sincronização ---
            
            // 1. Receber o estado completo do mapa ao conectar
            socket.on('map-state', (data) => {
                console.log("A receber o estado do mapa...", data);
                // Limpar o mapa local
                objects.forEach(obj => scene.remove(obj));
                objects = [];
                rulerSegments.forEach(seg => scene.remove(seg));
                rulerSegments = [];
                
                // Carregar objetos do servidor
                data.objects.forEach(objData => {
                    createObjectFromData(objData.id, objData);
                });
                // Carregar réguas do servidor
                data.rulers.forEach(rulerData => {
                    createRulerLineFromData(rulerData.id, rulerData);
                });
            });
            
            // 2. Ouvir por novos objetos
            socket.on('object-added', (data) => {
                // Verificar se já o temos (para evitar eco)
                if (!objects.find(o => o.userData.syncId === data.id)) {
                    createObjectFromData(data.id, data);
                }
            });
            
            // 3. Ouvir por movimentos de objetos
            socket.on('object-moved', (data) => {
                const object = objects.find(o => o.userData.syncId === data.id);
                if (object) {
                    object.position.set(data.position.x, data.position.y, data.position.z);
                }
            });
            
            // 4. Ouvir por objetos deletados
            socket.on('object-deleted', (data) => {
                const object = objects.find(o => o.userData.syncId === data.id);
                if (object) {
                    if (selectedObject === object) {
                        deselectObject();
                    }
                    scene.remove(object);
                    objects = objects.filter(o => o.userData.syncId !== data.id);
                }
            });
            
            // 5. Ouvir por novas réguas
            socket.on('ruler-added', (data) => {
                 if (!rulerSegments.find(s => s.userData.syncId === data.id)) {
                    createRulerLineFromData(data.id, data);
                 }
            });
            
            // 6. Ouvir por limpeza de réguas
            socket.on('rulers-cleared', () => {
                rulerSegments.forEach(segment => {
                    scene.remove(segment);
                    segment.geometry.dispose();
                });
                rulerSegments = [];
            });

            socket.on('disconnect', () => {
                console.log('Desconectado do servidor.');
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

        function onPointerDown(event) { // Não mais assíncrona
            if (isDraggingHeight) {
                isDraggingHeight = false;
                controls.enabled = true; 
                deselectObject();
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const allObjects = [plane, ...objects]; 
            const intersects = raycaster.intersectObjects(allObjects, true); 

            if (intersects.length > 0) {
                const firstIntersect = intersects[0];
                
                let clickedObject = null;
                let topLevelObject = firstIntersect.object;
                
                while (topLevelObject.parent && topLevelObject.parent !== scene) {
                    topLevelObject = topLevelObject.parent;
                }
                clickedObject = objects.find(obj => obj === topLevelObject);

                if (clickedObject) {
                    if (currentTool === 'move' && currentMoveMode === 'y-only') {
                        selectObject(clickedObject);
                        isDraggingHeight = true;
                        controls.enabled = false; 
                    } else {
                        if (selectedObject === clickedObject) {
                            deselectObject();
                        } else {
                            selectObject(clickedObject);
                        }
                    }
                } else if (firstIntersect.object.name === "tabletop") {
                    const intersectPoint = firstIntersect.point;
                    const snappedPosition = snapToCurrentGrid(intersectPoint);

                    switch (currentTool) {
                        case 'move':
                            if (selectedObject) {
                                // --- MODIFIED: Emitir evento de movimento ---
                                const docId = selectedObject.userData.syncId;
                                if (docId) {
                                    const finalPosition = snapToCurrentGrid(selectedObject.position);
                                    socket.emit('move-object', {
                                        id: docId,
                                        position: {
                                            x: finalPosition.x,
                                            y: selectedObject.position.y, // Manter o Y
                                            z: finalPosition.z
                                        }
                                    });
                                }
                                // --- END MODIFIED ---
                                controls.target.copy(selectedObject.position); 
                                deselectObject();
                            }
                            break;
                        case 'add':
                            if (selectedObjectType) { 
                                // --- MODIFIED: Chamar addObject (que emite) ---
                                addObject(snappedPosition); 
                                // --- END MODIFIED ---
                                controls.target.copy(snappedPosition); 
                                deselectObjectType(); 
                            }
                            break;
                        case 'ruler':
                            const rulerSnappedPosition = getCurrentRulerSnap(intersectPoint);
                            if (rulerPoints.length === 0) {
                                rulerTooltip.style.display = 'none';
                            }
                            const now = new Date().getTime();
                            if (now - lastRulerClickTime < 300) { 
                                // --- MODIFIED: Chamar finalizeRuler (que emite) ---
                                finalizeRulerLine();
                                // --- END MODIFIED ---
                            } else {
                                rulerPoints.push(rulerSnappedPosition); 
                            }
                            lastRulerClickTime = now;
                            break;
                    }
                }
            }
        }

        function onPointerMove(event) {
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;

            if (isDraggingHeight && selectedObject) {
                const deltaY = event.movementY * -0.01; 
                selectedObject.position.y += deltaY;

                const halfHeight = selectedObject.userData.halfHeight || 0;
                if (selectedObject.position.y < halfHeight) {
                    selectedObject.position.y = halfHeight;
                }
                return; 
            }

            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;

                if (currentTool === 'move' && selectedObject) {
                    const snappedPosition = snapToCurrentGrid(intersectPoint);
                    // Mover localmente (sem salvar ainda)
                    moveObject(selectedObject, snappedPosition);
                }

                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                    const rulerSnapPos = getCurrentRulerSnap(intersectPoint);
                    const previewPoints = [...rulerPoints, rulerSnapPos];
                    updateRuler(previewPoints); 
                    updateRulerTooltip(previewPoints, false);
                } else if (currentTool === 'ruler') {
                    updateRulerTooltip([], false, true); // Pass 'showAtZero'
                }
            }
        }

        function onContextMenu(event) { // Não mais assíncrona
            event.preventDefault(); 
            if (currentTool !== 'ruler') return;
            
            const canvas = renderer.domElement;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            mouse.x = (x / rect.width) * 2 - 1;
            mouse.y = -(y / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(plane);

            if (intersects.length > 0) {
                const intersectPoint = intersects[0].point;
                const snappedPosition = getCurrentRulerSnap(intersectPoint);

               if (rulerPoints.length > 0) {
                   finalizeRulerLine(false); // Finalizar mas não limpar (false)
               }
                
                rulerPoints = [snappedPosition]; // Começar novo array de pontos
               lastRulerClickTime = new Date().getTime(); 
            }
        }

        function onKeyDown(event) { // Não mais assíncrona
            // --- MODIFIED: Lógica de Delete local ---
            if ((event.key === "Delete" || event.key === "Backspace") && selectedObject) {
                const docId = selectedObject.userData.syncId; // Usar ID de sincronia
                if (docId) {
                    // --- MODIFIED: Emitir evento de delete ---
                    socket.emit('delete-object', { id: docId });
                    // --- END MODIFIED ---
                    deselectObject();
                }
            }
            // --- END MODIFIED ---
            
            if (event.key === "Escape") {
                if (currentTool === 'ruler' && rulerPoints.length > 0) {
                   clearInProgressRuler();
                } else if (isDraggingHeight) {
                    isDraggingHeight = false;
                    controls.enabled = true;
                    deselectObject();
                } else if (selectedObject) {
                    deselectObject();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        function snapToGrid(position) {
            const snappedX = Math.round(position.x / gridCellSize) * gridCellSize;
            const snappedZ = Math.round(position.z / gridCellSize) * gridCellSize;
            return new THREE.Vector3(snappedX, position.y, snappedZ);
        }

        function getRulerSnapPosition(rawPosition) {
            let snappedX, snappedZ;
            if (currentRulerSnapMode === 'center') {
                snappedX = (Math.floor(rawPosition.x / gridCellSize) + 0.5) * gridCellSize;
                snappedZ = (Math.floor(rawPosition.z / gridCellSize) + 0.5) * gridCellSize;
            } else { // 'corner'
                snappedX = Math.round(rawPosition.x / gridCellSize) * gridCellSize;
                snappedZ = Math.round(rawPosition.z / gridCellSize) * gridCellSize;
            }
            return new THREE.Vector3(snappedX, 0.02, snappedZ); 
        }

        // --- Object Management ---
        
        // --- MODIFIED: addObject agora emite para o servidor ---
        function addObject(position) {
            let halfHeight = 0.5; // Default
            let objectType = selectedObjectType; 
            let dataToSave = {};

            switch (objectType) {
                case 'token':
                    halfHeight = 0.1;
                    dataToSave = { type: 'token', color: 0xdd4444 }; 
                    break;
                case 'cube':
                    halfHeight = gridCellSize * 0.4;
                    dataToSave = { type: 'cube', color: 0xdd4444 };
                    break;
                case 'sphere':
                    halfHeight = gridCellSize * 0.4;
                    dataToSave = { type: 'sphere', color: 0xdd4444 };
                    break;
                case 'character':
                    if (selectedObjectData) {
                        const heightScale = selectedObjectData.appearance.height || 1;
                        halfHeight = (1 * heightScale) / 2 * 0.4; // Escalonado
                        dataToSave = { type: 'character', characterData: selectedObjectData };
                    } else {
                        return; // Sem dados, não adicionar
                    }
                    break;
                default:
                    return; 
            }

            dataToSave.position = { x: position.x, y: halfHeight, z: position.z };
            
            // --- MODIFIED: Emitir para o servidor ---
            socket.emit('add-object', dataToSave);
            // --- END MODIFIED ---
        }
        
        // --- MODIFIED: createObjectFromData (Usado pelo socket) ---
        function createObjectFromData(id, data) {
            let objectMesh;
            let halfHeight = 0.5;
            
            switch (data.type) {
                case 'token':
                    const cylGeom = new THREE.CylinderGeometry(gridCellSize * 0.4, gridCellSize * 0.4, 0.2, 32);
                    objectMesh = new THREE.Mesh(cylGeom, defaultMaterial.clone());
                    halfHeight = 0.1;
                    break;
                case 'cube':
                    const cubeGeom = new THREE.BoxGeometry(gridCellSize * 0.8, gridCellSize * 0.8, gridCellSize * 0.8);
                    objectMesh = new THREE.Mesh(cubeGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'sphere':
                    const sphGeom = new THREE.SphereGeometry(gridCellSize * 0.4, 32, 32);
                    objectMesh = new THREE.Mesh(sphGeom, defaultMaterial.clone());
                    halfHeight = gridCellSize * 0.4;
                    break;
                case 'character':
                    if (data.characterData) {
                        objectMesh = createCharacterModel(data.characterData);
                        const heightScale = data.characterData.appearance.height || 1;
                        halfHeight = (1 * heightScale) / 2 * 0.4; // Escalonado
                    }
                    break;
                default:
                    return; // Tipo desconhecido
            }

            if (objectMesh) {
                objectMesh.position.set(data.position.x, data.position.y, data.position.z);
                objectMesh.castShadow = true;
                objectMesh.receiveShadow = true;
                objectMesh.userData.halfHeight = halfHeight;
                objectMesh.userData.syncId = id; // VINCULAR AO ID DE SINCRONIA
                
                if (data.type === 'character') {
                    objectMesh.userData.characterData = data.characterData;
                } else {
                    objectMesh.userData.objectType = data.type;
                }
                
                scene.add(objectMesh);
                objects.push(objectMesh);
            }
        }

        function selectObject(object) {
            deselectObject(); 
            selectedObject = object;
            
            if (selectedObject.userData.characterData) {
                // Não mudar material
            } else {
                selectedObject.material = selectedMaterial;
            }

        function deselectObject() {
            if (selectedObject) {
                if (!selectedObject.userData.characterData) {
                    if (!selectedObject.material) {
                         selectedObject.material = defaultMaterial.clone();
                    } else {
                        selectedObject.material = defaultMaterial;
                    }
                }
            }
            selectedObject = null;
        }

        function moveObject(object, newPosition) {
            if (!object) return;
            const halfHeight = object.userData.halfHeight || 0;
            
            switch (currentMoveMode) {
                case 'standard':
                    object.position.x = newPosition.x;
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight); 
                    break;
                case 'x-only':
                    object.position.x = newPosition.x;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'z-only':
                    object.position.z = newPosition.z;
                    object.position.y = Math.max(object.position.y, halfHeight);
                    break;
                case 'y-only':
                    break;
            }
        }

        // --- Character Model Functions (per-part colors + proportions) ---
        const BASE_TORSO_HEIGHT = 1;
        const BASE_HEAD_RADIUS = 0.4;
        const BASE_ARM_LENGTH = 0.8;

        function charColors(charData) {
            const c = (charData.appearance && charData.appearance.colors) || {};
            const legacy = charData.color || '#dd4444';
            return {
                skin: c.skin || '#c68642',
                hair: c.hair || '#3b2716',
                torso: c.torso || legacy,
                legs: c.legs || '#3a3f4a',
                eyes: c.eyes || '#111111'
            };
        }

        function createCharacterModel(charData) {
            const modelGroup = new THREE.Group();
            const col = charColors(charData);
            const skinMat = new THREE.MeshLambertMaterial({ color: col.skin });
            const torsoMat = new THREE.MeshLambertMaterial({ color: col.torso });
            const legsMat = new THREE.MeshLambertMaterial({ color: col.legs });
            const hairMat = new THREE.MeshLambertMaterial({ color: col.hair });
            const eyeMat = new THREE.MeshBasicMaterial({ color: col.eyes });

            const add = (geo, mat, name) => { const m = new THREE.Mesh(geo, mat); m.name = name; modelGroup.add(m); return m; };
            add(new THREE.CylinderGeometry(0.3, 0.3, BASE_TORSO_HEIGHT, 32), torsoMat, 'torso');
            add(new THREE.SphereGeometry(BASE_HEAD_RADIUS, 32, 32), skinMat, 'head');
            add(new THREE.SphereGeometry(BASE_HEAD_RADIUS * 1.02, 24, 16, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat, 'hair');
            add(new THREE.SphereGeometry(0.05, 16, 16), eyeMat, 'leftEye');
            add(new THREE.SphereGeometry(0.05, 16, 16), eyeMat, 'rightEye');
            add(new THREE.CylinderGeometry(0.08, 0.08, BASE_ARM_LENGTH, 16), skinMat, 'leftArm');
            add(new THREE.CylinderGeometry(0.08, 0.08, BASE_ARM_LENGTH, 16), skinMat, 'rightArm');
            add(new THREE.CylinderGeometry(0.1, 0.1, 0.9, 16), legsMat, 'leftLeg');
            add(new THREE.CylinderGeometry(0.1, 0.1, 0.9, 16), legsMat, 'rightLeg');

            updateCharacterAppearance(modelGroup, charData.appearance || {});
            modelGroup.scale.set(0.4, 0.4, 0.4);
            return modelGroup;
        }

        function updateCharacterAppearance(modelGroup, appearance) {
            const H = appearance.height || 1;
            const B = appearance.build || 1;
            const HS = appearance.headSize || 1;
            const AL = appearance.armLength || 1;
            const LL = appearance.legLength || 1;
            const g = (n) => modelGroup.getObjectByName(n);
            const torso = g('torso'), head = g('head'), hair = g('hair'),
                  leftEye = g('leftEye'), rightEye = g('rightEye'),
                  leftArm = g('leftArm'), rightArm = g('rightArm'),
                  leftLeg = g('leftLeg'), rightLeg = g('rightLeg');

            torso.scale.set(B, H, B);
            torso.position.y = (BASE_TORSO_HEIGHT * H) / 2 - 0.5;
            head.scale.set(HS, HS, HS);
            const hr = BASE_HEAD_RADIUS * HS;
            head.position.y = (BASE_TORSO_HEIGHT * H) + hr - 0.5;
            if (hair) { hair.scale.set(HS, HS, HS); hair.position.y = head.position.y; }
            leftEye.position.set(-0.13 * HS, head.position.y + 0.1 * HS, hr - 0.05);
            rightEye.position.set(0.13 * HS, head.position.y + 0.1 * HS, hr - 0.05);
            leftArm.scale.set(B, AL, B); rightArm.scale.set(B, AL, B);
            const ay = torso.position.y + (BASE_TORSO_HEIGHT * H / 2) - (BASE_ARM_LENGTH * AL / 2);
            leftArm.position.set(-0.4 * B, ay, 0); rightArm.position.set(0.4 * B, ay, 0);
            leftLeg.scale.set(B, LL, B); rightLeg.scale.set(B, LL, B);
            const ly = torso.position.y - (BASE_TORSO_HEIGHT * H / 2);
            leftLeg.position.set(-0.15 * B, ly, 0); rightLeg.position.set(0.15 * B, ly, 0);
        }
        // --- End Character Model Functions ---

        // --- UI Management (Left Menu) ---
        function setTool(toolName) {
            if (currentTool === 'ruler' && toolName !== 'ruler') {
                clearRuler();
            }
            if (toolName !== 'ruler') {
                rulerTooltip.style.display = 'none';
            }
            currentTool = toolName;
            if(toolName !== 'add' && toolName !== null) { 
                deselectObjectType();
            }
            for (const key in toolMenuButtons) {
                if (key === toolName || (key === 'ruler' && toolName === 'ruler')) { 
                    toolMenuButtons[key].classList.add('active');
                } else {
                    toolMenuButtons[key].classList.remove('active');
                }
            }
        }

        // --- Move Tool Logic ---
        function setMoveMode(mode) {
            currentMoveMode = mode;
            setTool('move'); 
            for (const key in moveSubMenuButtons) {
                if (key === mode || (key === 'standard' && mode === 'standard')) {
                    moveSubMenuButtons[key].classList.add('active');
                } else {
                    moveSubMenuButtons[key].classList.remove('active');
                }
            }
            hideMoveSubMenu();
        }
        function handleMoveButtonPress(event) {
            isLongPress = false;
            movePressTimer = setTimeout(() => {
                isLongPress = true;
                showMoveSubMenu();
            }, 1000); 
        }
        function handleMoveButtonRelease(event) {
            clearTimeout(movePressTimer);
            if (!isLongPress) {
                setMoveMode('standard');
            }
        }
        function showMoveSubMenu() {
            moveSubMenu.style.display = 'block';
        }
        function hideMoveSubMenu() {
            moveSubMenu.style.display = 'none';
        }
        // --- End Move Tool Logic ---

        // --- Ruler Tool Logic ---
        function setRulerMode(mode) {
            currentRulerMode = mode;
            setTool('ruler');
            rulerSubMenuButtons.straight.classList.toggle('active', mode === 'straight');
            rulerSubMenuButtons.curved.classList.toggle('active', mode === 'curved');
        }
        function setRulerSnapMode(mode) {
            currentRulerSnapMode = mode;
            rulerSnapSubMenuButtons.center.classList.toggle('active', mode === 'center');
            rulerSnapSubMenuButtons.corner.classList.toggle('active', mode ==='corner');
        }
        function setRulerColor(colorValue, clickedButton) {
            currentRulerColor = parseInt(colorValue); 
            rulerLineMaterial.color.setHex(currentRulerColor);
            rulerPreviewMaterial.color.setHex(currentRulerColor);
            document.querySelectorAll('#ruler-colors .color-swatch').forEach(swatch => {
                swatch.classList.remove('active');
            });
            clickedButton.classList.add('active');
        }
        function handleRulerButtonPress(event) {
            isRulerLongPress = false;
            rulerPressTimer = setTimeout(() => {
                isRulerLongPress = true;
                showRulerSubMenu();
            }, 1000); 
        }
        function handleRulerButtonRelease(event) {
            clearTimeout(rulerPressTimer);
            if (!isRulerLongPress) {
                setRulerMode(currentRulerMode);
            }
        }
        function showRulerSubMenu() {
            rulerSubMenu.style.display = 'block';
        }
        function hideRulerSubMenu() {
            rulerSubMenu.style.display = 'none';
        }
        function calculateLineLength(points) {
            let totalLength = 0;
            if (!points || points.length < 2) return 0;
            for (let i = 0; i < points.length - 1; i++) {
                totalLength += points[i].distanceTo(points[i+1]);
            }
            return totalLength;
        }
        function updateRulerTooltip(points, isFinal = false, showAtZero = false) {
            if (!rulerTooltip) return;
            const hexLayer = isHexLayer();
            const unit = hexLayer ? 'km' : 'ft';

            if (showAtZero && points.length === 0) {
                rulerTooltip.style.display = 'block';
                rulerTooltip.textContent = '0 ' + unit;
                rulerTooltip.style.left = `${lastMouseX}px`;
                rulerTooltip.style.top = `${lastMouseY}px`;
                return;
            }
            if (points.length < 2) {
                rulerTooltip.style.display = 'none';
                return;
            }

            let value;
            if (hexLayer) {
                value = measurePath(points).value; // hex steps * km per hex
            } else {
                let totalLength = 0;
                if (currentRulerMode === 'curved' && points.length > 1) {
                    const curve = new THREE.CatmullRomCurve3(points, false, 'centripetal', 0.5);
                    totalLength = curve.getLength();
                } else {
                    totalLength = calculateLineLength(points);
                }
                value = (totalLength / gridCellSize) * FEET_PER_GRID_CELL;
            }

            rulerTooltip.style.display = 'block';
            rulerTooltip.style.left = `${lastMouseX}px`;
            rulerTooltip.style.top = `${lastMouseY}px`;
            rulerTooltip.textContent = (isFinal ? 'Total: ' : '') + value.toFixed(1) + ' ' + unit;
        }
        function updateRuler(previewPoints) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (previewPoints.length < 2) return;
            let geometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(previewPoints, false, 'centripetal', 0.5);
               geometryPoints = curve.getPoints(previewPoints.length * 10); 
           } else {
               geometryPoints = previewPoints;
           }
           const lineGeometry = new THREE.BufferGeometry().setFromPoints(geometryPoints);
           currentRulerLine = new THREE.Line(lineGeometry, rulerPreviewMaterial);
           currentRulerLine.material.color.setHex(currentRulerColor);
           currentRulerLine.computeLineDistances(); 
           scene.add(currentRulerLine);
        }
        
        // --- NEW: createRulerLineFromData (usado pelo socket) ---
        function createRulerLineFromData(id, data) {
            const points = data.points.map(p => new THREE.Vector3(p.x, p.y, p.z));
            const finalGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const finalLine = new THREE.Line(finalGeometry, rulerLineMaterial.clone());
            finalLine.material.color.setHex(data.color);
            finalLine.userData.syncId = id; // Vincular ao ID
            finalLine.userData.rulerData = data; 
            
            rulerSegments.push(finalLine);
            scene.add(finalLine);
        }
        
        // --- MODIFIED: finalizeRulerLine agora emite para o servidor ---
        function finalizeRulerLine(shouldClearPoints = true) {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
           }
           if (rulerPoints.length < 2) {
               clearInProgressRuler();
               return; 
           }
           let finalGeometryPoints;
           if (currentRulerMode === 'curved') {
               const curve = new THREE.CatmullRomCurve3(rulerPoints, false, 'centripetal', 0.5);
               finalGeometryPoints = curve.getPoints(rulerPoints.length * 10);
           } else {
               finalGeometryPoints = rulerPoints;
           }
           
           updateRulerTooltip(finalGeometryPoints, true);
           
           // Emitir para o servidor
            const dataToSave = {
                points: finalGeometryPoints.map(p => ({x: p.x, y: p.y, z: p.z})),
                mode: currentRulerMode,
                color: currentRulerColor
            };
            socket.emit('add-ruler', dataToSave);
           
           if (shouldClearPoints) {
                clearInProgressRuler();
           }
        }
        
       function clearInProgressRuler() {
           if (currentRulerLine) {
               scene.remove(currentRulerLine);
               currentRulerLine.geometry.dispose();
               currentRulerLine = null;
           }
           rulerPoints = [];
           lastRulerClickTime = 0;
           rulerTooltip.style.display = 'none'; 
        }
        
        // --- MODIFIED: clearRuler agora emite para o servidor ---
        function clearRuler() {
           clearInProgressRuler(); // Limpar pré-visualização local

           // Emitir para o servidor; o listener 'rulers-cleared' fará a remoção da cena.
           // (Não esvaziar rulerSegments aqui, senão o listener não teria o que remover.)
           socket.emit('clear-rulers');

           rulerTooltip.style.display = 'none';
        }
        // --- End Ruler Tool Logic ---

        // --- Init ---
        try {
            init();
        } catch (e) {
            console.error('Fatal Error on Init:', e);
        }
        
    </script>
</body>
</html>
